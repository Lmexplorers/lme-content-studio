      <h2 style="font-size:14px;font-weight:500;margin:24px 0 10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px">${t('matGuidesHeader')}</h2>

      <h2 style="font-size:14px;font-weight:500;margin:24px 0 10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px">${t('matSortingMatsHeader')}</h2>

      ${mat.certificates.map(c => renderCertificate(c)).join('')}
    ` : ''}

function renderQuickStartSuggestions() {
  const p = State.project;
  const suggestions = [];

  /* Suggest card sets from each non-empty asset category */
  ASSET_CATEGORIES.forEach(cat => {
    const items = p.assetLibrary[cat.id] || [];
    if (items.length >= 2) {
      const labelTxt = State.ui.lang === 'no'
        ? `3-delte kort fra ${cat.label.toLowerCase()} (${items.length} elementer)`
        : `3-part cards from ${cat.label.toLowerCase()} (${items.length} items)`;
      suggestions.push({
        label: labelTxt,
        action: `Actions.createCardSet({ type:'threePartCard', source:'fromAssetCategory', sourceCategory:'${cat.id}', title:'${escMeta(cat.label)} — ${escMeta(p.meta.topic||p.meta.title)}' })`
      });
    }
  });

  /* From vocabulary if present */
  if (p.curriculum.vocabulary && p.curriculum.vocabulary.split('\n').filter(w=>w.trim()).length >= 2) {
    const labelTxt = State.ui.lang === 'no'
      ? `Nomenklaturkort fra læreplan-vokabular`
      : `Nomenclature cards from curriculum vocabulary`;
    suggestions.push({
      label: labelTxt,
      action: `Actions.createCardSet({ type:'nomenclatureCard', source:'fromVocabulary', title:'${escMeta(p.meta.title||'Vocabulary')} — Nomenclature' })`
    });
  }

  /* From book content pages if titled */
  const titledPages = p.pages.filter(pg => pg.role === 'content' && pg.title);
  if (titledPages.length >= 2) {
    const labelTxt = State.ui.lang === 'no'
      ? `Definisjonskort fra bok-innhold (${titledPages.length} sider)`
      : `Definition cards from book content (${titledPages.length} pages)`;
    suggestions.push({
      label: labelTxt,
      action: `Actions.createCardSet({ type:'definitionOnly', source:'fromPages', title:'${escMeta(p.meta.title||'Book')} — Definitions' })`
    });
  }

  if (suggestions.length === 0) return '';

  return `
    <div style="margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border)">
      <div class="field-label">${t('matSuggestionsLabel')}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${suggestions.map(s => `<button class="btn btn-sm" onclick="${s.action}">${s.label} →</button>`).join('')}
      </div>
    </div>
  `;
}

  const itemsLabel = State.ui.lang === 'no' ? 'elementer' : 'items';
  const promptsLabel = State.ui.lang === 'no' ? 'prompts' : 'prompts';
  const guideLabel = State.ui.lang === 'no' ? 'veiledning ✓' : 'guide ✓';

  return `
    <div class="card material-card">
      <div class="card-head" style="align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <span class="pill pill-pink">${escMeta(typeDef.label)}</span>
            <span class="pill">${set.items.length} ${itemsLabel}</span>
            ${promptCount > 0 ? `<span class="pill pill-teal">${promptCount} ${promptsLabel}</span>` : ''}
            ${hasGuide ? `<span class="pill pill-amber">${guideLabel}</span>` : ''}
          </div>
          <input type="text" value="${escMeta(set.title)}" oninput="Actions.updateCardSetTitle('${set.id}', this.value)" style="font-size:15px;font-weight:500;border:none;padding:2px 0;background:transparent;width:100%">
          <p class="card-sub" style="margin-top:2px">${escMeta(typeDef.description)}</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button class="btn btn-sm" onclick="toggleCardSetExpand('${set.id}')">${t('matExpandItems')}</button>
          <button class="btn btn-ghost btn-sm" onclick="Actions.removeCardSet('${set.id}')">${t('delete')}</button>
        </div>
      </div>

      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
        ${typeDef.presetForImage ? `<button class="btn btn-sm btn-primary" onclick="Actions.generateAllCardItemPrompts('${set.id}')">${promptCount === set.items.length ? t('matRegenAllPrompts') : t('matGenAllPrompts')}</button>` : ''}

          <div style="flex:1;min-width:0">
            <div class="row row-${showClass?'2':showDef?'2':'1'}" style="margin-bottom:6px">
              <div class="field" style="margin-bottom:0">
                <div class="field-label">${t('matLabelNo')}</div>
                <input type="text" value="${escMeta(item.label)}" oninput="Actions.updateCardItem('${set.id}','${item.id}','label',this.value)">
              </div>
              ${showClass ? `
                <div class="field" style="margin-bottom:0">
                  <div class="field-label">${t('matClassification')}</div>

            ` : ''}
            ${item.imagePromptSet ? `
              <div style="background:var(--gray-50);border-radius:var(--radius-sm);padding:8px 10px;margin-top:4px">
                <div style="font-size:10px;text-transform:uppercase;color:var(--text-subtle);letter-spacing:0.6px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
                  <span>${promptLabelLocale} — ${escMeta((STYLE_PRESETS[item.imagePromptSet.presetId]||{}).label || '')}</span>
                  <button class="btn-ghost btn-sm" onclick="copyCardItemPrompt('${set.id}','${item.id}','dalle')">${t('matCopyDalle')}</button>

        </div>
      `).join('')}
      <button class="btn btn-sm" onclick="Actions.addCardItem('${set.id}')" style="margin-top:6px">${t('matAddItem')}</button>

function toggleCardSetExpand(setId) {
  const el = document.getElementById('cardset_items_' + setId);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

function copyCardItemPrompt(setId, itemId, format) {
  const set = State.project.materials.cardSets.find(s => s.id === setId);
  if (!set) return;
  const item = set.items.find(i => i.id === itemId);
  if (!item || !item.imagePromptSet) {
    toast(t('toastPromptNotGenerated'));
    return;
  }
  copyToClipboard(item.imagePromptSet[format] || item.imagePromptSet.universal);

function renderTimelines() {
  const p = State.project;
  const timelines = p.materials.timelines || [];
  const totalPanels = timelines.reduce((s, t) => s + t.panels.length, 0);
  const totalPrompts = timelines.reduce((s, t) => s + t.panels.filter(pn => pn.imagePromptSet).length, 0);

  return `
    ${pageHead(t('tlTitle'), t('tlSubtitle'))}
    ${renderWorkspaceBanner()}

    <div class="stat-grid">
      <div class="stat"><div class="stat-label">${t('tlStatTimelines')}</div><div class="stat-value">${timelines.length}</div></div>
      <div class="stat"><div class="stat-label">${t('tlStatTotalPanels')}</div><div class="stat-value">${totalPanels}</div></div>
      <div class="stat"><div class="stat-label">${t('tlStatPrompts')}</div><div class="stat-value">${totalPrompts}</div></div>
      <div class="stat"><div class="stat-label">${t('tlStatTemplates')}</div><div class="stat-value">${Object.keys(TIMELINE_TEMPLATES).length}</div></div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <h3 class="card-title">${t('tlNewTimelineTitle')}</h3>
          <p class="card-sub">${t('tlNewTimelineSub')}</p>
        </div>
      </div>

        <strong>${t('tlEmpty')}</strong>
        ${t('tlEmptySub')}

function renderTemplateCard(tpl) {
  const panelCount = tpl.panels.length;
  const yearsLabel = State.ui.lang === 'no' ? 'år' : 'years';
  return `
    <div class="timeline-tpl-card" onclick="startTimelineFromTemplate('${tpl.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
        <div style="font-weight:500;font-size:13px">${escMeta(tpl.labelNo || tpl.label)}</div>
        ${panelCount > 0 ? `<span class="pill">${panelCount}</span>` : ''}
      </div>
      ${tpl.label !== tpl.labelNo && tpl.labelNo ? `<div style="font-size:10px;color:var(--text-subtle);margin-bottom:6px">${escMeta(tpl.label)}</div>` : ''}
      <div style="font-size:11px;color:var(--text-muted);line-height:1.5">${escMeta(tpl.description)}</div>
      <div style="font-size:10px;color:var(--text-subtle);margin-top:6px;text-transform:uppercase;letter-spacing:0.5px">
        ${tpl.ageGroup === 'all' ? t('tlAllAges') : tpl.ageGroup + ' ' + yearsLabel}  ·  ${escMeta(tpl.defaultFormat)}
      </div>
    </div>
  `;
}

function startTimelineFromTemplate(templateId) {
  const tpl = TIMELINE_TEMPLATES[templateId];
  if (!tpl) return;
  if (templateId === 'custom') {
    const customTitle = State.ui.lang === 'no' ? 'Ny tilpasset tidslinje' : 'New custom timeline';
    Actions.createTimeline({ templateId, title: customTitle, format: '6:1' });
  } else {
    Actions.createTimeline({ templateId, title: tpl.labelNo || tpl.label, format: tpl.defaultFormat });
  }
}

function renderTimeline(tl) {
  const tpl = TIMELINE_TEMPLATES[tl.templateId];
  const formatDef = TIMELINE_FORMATS[tl.format];
  const promptCount = tl.panels.filter(p => p.imagePromptSet).length;
  const panelsLabel = State.ui.lang === 'no' ? 'paneler' : 'panels';
  const promptsLabel = State.ui.lang === 'no' ? 'prompts' : 'prompts';
  const ageLabel = State.ui.lang === 'no' ? 'Alder' : 'Age';
  const aspectLabel = State.ui.lang === 'no' ? 'aspekt' : 'aspect';

  return `
    <div class="card timeline-card">
      <div class="card-head" style="align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <span class="pill pill-pink">${escMeta(formatDef ? formatDef.label : tl.format)}</span>
            <span class="pill">${tl.panels.length} ${panelsLabel}</span>
            ${promptCount > 0 ? `<span class="pill pill-teal">${promptCount} ${promptsLabel}</span>` : ''}
            ${tpl ? `<span class="pill" style="background:var(--amber-50);color:var(--amber-800)">${escMeta(tpl.labelNo || tpl.label)}</span>` : ''}
          </div>
          <input type="text" value="${escMeta(tl.title)}" oninput="Actions.updateTimelineField('${tl.id}','title',this.value)" style="font-size:15px;font-weight:500;border:none;padding:2px 0;background:transparent;width:100%">
          <p class="card-sub" style="margin-top:2px">${ageLabel} ${escMeta(tl.ageGroup)}${tl.amiArea ? ' · AMI: ' + escMeta(tl.amiArea) : ''} · ${aspectLabel} ${escMeta(tl.aspectPerPanel)}</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button class="btn btn-sm" onclick="toggleTimelineExpand('${tl.id}')">${t('tlExpandPanels')}</button>
          <button class="btn btn-ghost btn-sm" onclick="Actions.removeTimeline('${tl.id}')">${t('delete')}</button>
        </div>
      </div>

      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
        <button class="btn btn-sm btn-primary" onclick="Actions.generateAllTimelinePrompts('${tl.id}')">${promptCount === tl.panels.length && tl.panels.length > 0 ? t('tlRegenAllPrompts') : t('tlGenAllPrompts')}</button>
        <button class="btn btn-sm" onclick="Actions.addTimelinePanel('${tl.id}')">${t('tlAddPanel')}</button>
        <button class="btn btn-sm" onclick="copyToClipboard(buildTimelineExportText(State.project, State.project.materials.timelines.find(t => t.id === '${tl.id}')))">${t('tlCopyExport')}</button>
        <button class="btn btn-sm" onclick="downloadText(buildTimelineExportText(State.project, State.project.materials.timelines.find(t => t.id === '${tl.id}')), '${escMeta(tl.title.replace(/[^a-z0-9]+/gi,'-').toLowerCase())}.md')">${t('matDownloadMd')}</button>
      </div>

      <div id="timeline_panels_${tl.id}" style="display:none">
        ${renderTimelinePanels(tl)}
      </div>
    </div>
  `;
}

function renderTimelinePanels(tl) {
  if (tl.panels.length === 0) {
    return `<div style="font-size:12px;color:var(--text-subtle);font-style:italic;padding:12px 0">${t('tlNoPanels')}</div>`;
  }
  return `
    <div style="border-top:0.5px solid var(--border);padding-top:12px;margin-top:8px">
      ${tl.panels.map((panel, i) => renderTimelinePanel(tl, panel, i)).join('')}
    </div>
  `;
}

          <div class="field" style="margin-bottom:0">
            <div class="field-label">${t('tlPanelEra')}</div>
            <input type="text" value="${escMeta(panel.era)}" oninput="Actions.updateTimelinePanel('${tl.id}','${panel.id}','era',this.value)" placeholder="${t('tlPanelEraPh')}">
          </div>
          <div class="field" style="margin-bottom:0">
            <div class="field-label">${t('tlPanelDuration')}</div>
            <input type="text" value="${escMeta(panel.durationLabel)}" oninput="Actions.updateTimelinePanel('${tl.id}','${panel.id}','durationLabel',this.value)" placeholder="${t('tlPanelDurationPh')}">
          </div>
        </div>
        <div class="field" style="margin-bottom:6px">
          <div class="field-label">${t('tlPanelSubtitle')}</div>
          <input type="text" value="${escMeta(panel.subtitle)}" oninput="Actions.updateTimelinePanel('${tl.id}','${panel.id}','subtitle',this.value)" placeholder="${t('tlPanelSubtitlePh')}">

        <div class="field" style="margin-bottom:6px">
          <div class="field-label">${t('tlPanelSeed')}</div>

        </div>
        ${ps ? `
          <div style="background:var(--gray-50);border-radius:var(--radius-sm);padding:8px 10px;margin-top:4px">
            <div style="font-size:10px;text-transform:uppercase;color:var(--text-subtle);letter-spacing:0.6px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
              <span>${promptLabel} ${isStale ? '<span class="pill" style="background:var(--amber-50);color:var(--amber-800);margin-left:6px">'+t('tlPromptStaleBadge')+'</span>' : ''}</span>

            </div>
            <div style="font-size:11px;color:var(--text-muted);font-family:monospace;line-height:1.5;max-height:120px;overflow-y:auto">${escMeta(ps.dalle.slice(0,400))}${ps.dalle.length>400?'…':''}</div>

      </div>

function renderCurriculum() {

  const linkedGoals = (c.linkedGoals || []).map(getLk20GoalById).filter(Boolean);

  return `
    ${pageHead(t('curTitle'), t('curSubtitle'))}
    ${renderWorkspaceBanner()}

    <div class="stat-grid">
      <div class="stat"><div class="stat-label">${t('curStatLinkedTasks')}</div><div class="stat-value">${linkedTasks.length}</div></div>
      <div class="stat"><div class="stat-label">${t('curStatLinkedGoals')}</div><div class="stat-value">${linkedGoals.length}</div></div>

        </div>
        ${linkedTasks.length > 0 ? `
          <div class="field-label" style="margin-top:8px">${t('curAmiTasksLabel')}</div>
          ${linkedTasks.map(tk => renderLinkedTaskRow(tk)).join('')}
        ` : ''}

          ${linkedGoals.map(g => renderLinkedGoalRow(g)).join('')}
        ` : ''}
      </div>
    ` : ''}

    <div class="curriculum-tabs">
      <button class="ct-tab on" onclick="switchCurriculumTab(this, 'ami')">${t('curTabAmi')}</button>

function renderSeriesLibrary() {
  const all = loadAllSeries();
  const ids = Object.keys(all).sort((a, b) => {
    /* Builtin first, then by updated date */
    if (all[a].isBuiltin && !all[b].isBuiltin) return -1;
    if (!all[a].isBuiltin && all[b].isBuiltin) return 1;
    return (all[b].updatedAt || '').localeCompare(all[a].updatedAt || '');
  });

  const builtinCount = ids.filter(id => all[id].isBuiltin).length;
  const customCount = ids.length - builtinCount;

  return `
    ${pageHead(t('serLibTitle'), t('serLibSubtitle'))}

    <div class="stat-grid">
      <div class="stat"><div class="stat-label">${t('serStatTotal')}</div><div class="stat-value">${ids.length}</div></div>
      <div class="stat"><div class="stat-label">${t('serStatBuiltin')}</div><div class="stat-value">${builtinCount}</div></div>
      <div class="stat"><div class="stat-label">${t('serStatCustom')}</div><div class="stat-value">${customCount}</div></div>
      <div class="stat"><div class="stat-label">${t('serStatLinked')}</div><div class="stat-value">${ids.reduce((s,id) => s + getProjectsInSeries(id).length, 0)}</div></div>
    </div>

    <div class="card" style="background:var(--gray-50);border-style:dashed;margin-bottom:18px">
      <p style="margin:0;font-size:12px;color:var(--text-muted);line-height:1.6">
        ${t('serIntro')}
      </p>
    </div>

    <div style="margin-bottom:14px">
      <button class="btn btn-primary" onclick="showSheet('newSeries')">${t('serNewSeries')}</button>
    </div>

    ${ids.length === 0 ? `<div class="empty"><strong>${t('serEmpty')}</strong>${t('serEmptySub')}</div>` :
      `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">

      </div>`

}

        <div style="display:flex;gap:6px;margin-bottom:10px">

          `).join('')}

    </div>
  `;
}

function submitAddSeriesAsset(seriesId, catId) {
  const label = document.getElementById('seed_'+seriesId+'_'+catId+'_label').value.trim();
  const desc = document.getElementById('seed_'+seriesId+'_'+catId+'_desc').value.trim();
  if (!label) return;
  Actions.addSeriesAsset(seriesId, catId, label, desc);
}

function submitAddRosterTitle(seriesId) {
  const title = document.getElementById('roster_'+seriesId+'_input').value.trim();
  if (!title) return;
  Actions.addRosterTitle(seriesId, title);
}

function renderCharacters() {
  return `
    ${pageHead(t('charsTitle'), t('charsSubtitle'))}
    ${Object.values(LOCKED_CHARACTERS).map(c => `
      <div class="card">
        <div class="card-head">
          <div>
            <h3 class="card-title">${c.name}</h3>
            <p class="card-sub">${t('charsAge')} ${c.age} · ${t('charsStyle')}</p>
          </div>
          <span class="pill pill-pink">${t('charsLocked')}</span>
        </div>
        <div style="font-size:12px;line-height:1.7">
          <div style="margin-bottom:6px"><span style="color:var(--text-subtle);text-transform:uppercase;font-size:10px;letter-spacing:0.6px">${t('charsAppearance')}</span><br>${escMeta(c.appearance)}</div>
          <div style="margin-bottom:6px"><span style="color:var(--text-subtle);text-transform:uppercase;font-size:10px;letter-spacing:0.6px">${t('charsOutfit')}</span><br>${escMeta(c.outfit)}</div>
          <div style="margin-bottom:6px"><span style="color:var(--text-subtle);text-transform:uppercase;font-size:10px;letter-spacing:0.6px">${t('charsProps')}</span><br>${escMeta(c.props)}</div>
          <div><span style="color:var(--text-subtle);text-transform:uppercase;font-size:10px;letter-spacing:0.6px">${t('charsConsistency')}</span><br>${escMeta(c.consistency)}</div>
        </div>
      </div>
    `).join('')}
    <div class="card" style="background:var(--gray-50);border-style:dashed">
      <p style="margin:0;font-size:12px;color:var(--text-muted)">${t('charsFutureNote')}</p>
    </div>

function pageHead(title, sub) {
  return `<div class="pane-head"><div><div class="pane-eyebrow">${escMeta(sub||'')}</div><h1 class="pane-title">${escMeta(title)}</h1></div></div>`;
}

/* Banner shown on standalone tool views (Materials, Timelines, Curriculum, Asset library)
   so the user knows whether they're working in a real book project or in the shared
   library workspace, and can switch between the two. */
function renderWorkspaceBanner() {
  const p = State.project;
  if (!p) return '';
  if (p.isLibraryWorkspace) {
    const msg = State.ui.lang === 'no'
      ? 'Du jobber i <strong>biblioteket</strong> — uavhengig av en bok. Materialene du lager her lagres på sin egen plass og kan brukes i Montessori-arbeid uten et bokprosjekt. Vil du knytte arbeidet til en bok? Opprett eller åpne et prosjekt fra <a href="#" onclick="Actions.setView(\'library\');return false" style="color:var(--pink-400)">Alle prosjekter</a>.'
      : 'You\'re working in the <strong>library</strong> — independent of any book. Materials you build here are saved separately and can be used in Montessori work without a book project. Want to tie this to a book? Open or create a project from <a href="#" onclick="Actions.setView(\'library\');return false" style="color:var(--pink-400)">All projects</a>.';
    return `<div class="card" style="background:var(--pink-50);border:0.5px solid var(--pink-100);margin-bottom:18px;padding:12px 16px">
      <p style="margin:0;font-size:12px;color:var(--pink-800);line-height:1.6">🩷 ${msg}</p>
    </div>`;
  }
  const projectTitle = escMeta(p.meta.title || t('untitled'));
  const msg = State.ui.lang === 'no'
    ? `Du jobber i prosjektet <strong>${projectTitle}</strong>. Endringene her lagres på dette prosjektet.`
    : `You\'re working inside the project <strong>${projectTitle}</strong>. Changes here save to this project.`;
  return `<div style="font-size:11px;color:var(--text-subtle);margin-bottom:14px;padding:6px 10px;background:var(--gray-50);border-radius:var(--radius-sm)">${msg}</div>`;
}

        </div>
      </div>
    `;
  } else if (kind === 'export') {
    const pack = buildPromptPack(data.project);
    html = `
      <div class="sheet" style="max-width:680px">
        <h2 class="sheet-title">${t('expSheetTitle')}</h2>
        <p class="sheet-sub">${t('expSheetSub')}</p>
        <div class="export-box">${escMeta(pack)}</div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
          <button class="btn" onclick="closeSheet()">${t('close')}</button>
          <button class="btn btn-primary" onclick="copyToClipboard(buildPromptPack(State.project));closeSheet()">${t('expCopyClipboard')}</button>
        </div>
      </div>
    `;
  } else if (kind === 'linkAssets') {
    const project = State.project;
    const page = project.pages[data.pageIdx];
    const linked = new Set((page.assetRefs||[]).map(r => r.category+':'+r.id));
    const totalAssets = ASSET_CATEGORIES.reduce((s,c) => s + (project.assetLibrary[c.id]||[]).length, 0);
    html = `
      <div class="sheet">
        <h2 class="sheet-title">${t('alLinkSheetTitle', {n: page.index+1})}</h2>
        <p class="sheet-sub">${t('alLinkSheetSub')}</p>
        ${totalAssets === 0 ? `<div class="empty"><strong>${t('alEmptyTitle')}</strong>${t('alEmptySub')}<div style="margin-top:14px"><button class="btn btn-primary" onclick="closeSheet();Actions.setView('assetLibrary')">${t('alOpenLib')}</button></div></div>` :
          ASSET_CATEGORIES.map(cat => {
            const items = project.assetLibrary[cat.id] || [];
            if (items.length === 0) return '';
            return `
              <div style="margin-bottom:14px">
                <div class="field-label" style="margin-bottom:6px">${escMeta(cat.label)}</div>
                ${items.map(a => {
                  const key = cat.id+':'+a.id;
                  const isLinked = linked.has(key);
                  return `
                    <label class="asset-link-row" onclick="event.preventDefault();Actions.togglePageAsset(${data.pageIdx},'${cat.id}','${a.id}');showSheet('linkAssets',{pageIdx:${data.pageIdx}})">
                      <input type="checkbox" ${isLinked?'checked':''} onclick="event.stopPropagation();event.preventDefault();Actions.togglePageAsset(${data.pageIdx},'${cat.id}','${a.id}');showSheet('linkAssets',{pageIdx:${data.pageIdx}})">
                      <span style="font-size:13px">${escMeta(a.label)}</span>
                      ${a.description ? `<span style="font-size:11px;color:var(--text-subtle);margin-left:4px">${escMeta(a.description)}</span>` : ''}
                    </label>
                  `;
                }).join('')}
              </div>
            `;
          }).join('')
        }
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
          <button class="btn btn-primary" onclick="closeSheet()">${t('done')}</button>
        </div>
      </div>
    `;
  } else if (kind === 'newSeries') {
    html = `
      <div class="sheet">
        <h2 class="sheet-title">${t('serSheetTitle')}</h2>
        <p class="sheet-sub">${t('serSheetSub')}</p>

          <div class="field">

          </div>
          <div class="field">
            <div class="field-label">${t('serSheetPagesLabel')}</div>

          <button class="btn btn-primary" onclick="submitNewSeries()">${t('create')}</button>
        </div>

  } else if (kind === 'newCardSet') {

    if (vocabCount > 0) {
      sourceOptions.push({ value: 'vocab', label: `${t('matSourceFromVocab')} (${vocabCount} ${wordsLabel})` });

        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
          <button class="btn" onclick="closeSheet()">${t('cancel')}</button>
          <button class="btn btn-primary" onclick="submitNewSortingMat()">${t('create')}</button>
        </div>
      </div>
    `;
  }
  root.innerHTML = `<div class="sheet-bg" onclick="if(event.target===this)closeSheet()">${html}</div>`;
}

function closeSheet() { document.getElementById('sheetRoot').innerHTML = ''; }

function submitNewCardSet() {
  const type = document.getElementById('ncs_type').value;
  const sourceRaw = document.getElementById('ncs_source').value;
  const title = document.getElementById('ncs_title').value.trim();

  let source = 'manual', sourceCategory = null;
  if (sourceRaw.startsWith('asset:')) {
    source = 'fromAssetCategory';
    sourceCategory = sourceRaw.slice(6);
  } else if (sourceRaw === 'vocab') {
    source = 'fromVocabulary';
  } else if (sourceRaw === 'pages') {
    source = 'fromPages';
  }

  closeSheet();
  Actions.createCardSet({ type, source, sourceCategory, title });
}

function submitNewSortingMat() {
  const title = document.getElementById('nsm_title').value.trim();
  const catsRaw = document.getElementById('nsm_categories').value;
  const categories = catsRaw.split(',').map(c => c.trim()).filter(Boolean);
  if (categories.length === 0) {
    toast(State.ui.lang==='no' ? 'Legg til minst én kategori' : 'Add at least one category');
    return;
  }
  closeSheet();
  Actions.createSortingMat({ title, categories });
}

function submitNewProject() {
  const seed = {
    title: document.getElementById('np_title').value.trim(),
    bookType: document.getElementById('np_type').value,
    pageCount: parseInt(document.getElementById('np_pages').value, 10),
    ageGroup: document.getElementById('np_age').value,
    language: document.getElementById('np_lang').value
  };
  closeSheet();
  Actions.newProject(seed);
}

function submitNewSeries() {
  const seed = {
    name: document.getElementById('ns_name').value.trim() || 'Untitled series',
    nameNo: document.getElementById('ns_nameNo').value.trim(),
    description: document.getElementById('ns_description').value.trim(),
    bookType: document.getElementById('ns_bookType').value,
    pageCount: parseInt(document.getElementById('ns_pageCount').value, 10),
    ageGroup: document.getElementById('ns_ageGroup').value,
    defaultPreset: document.getElementById('ns_preset').value
  };
  closeSheet();
  Actions.createSeries(seed);
}

/* =====================================================================
   8. UTILITIES
===================================================================== */

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => toast(t('copied')));
}

function confirmRemoveAsset(category, id) {
  if (confirm(t('confirmRemoveAsset'))) Actions.removeAsset(category, id);
}

function confirmRegeneratePages() {
  if (confirm(t('pagesRegenerateConfirm'))) Actions.generatePages();
}

function downloadText(text, filename) {
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* =====================================================================
   9. BOOT
===================================================================== */

(function init() {
  /* Locked to English in this build. */
  State.ui.lang = 'en';
  seedBuiltinSeries();
  const active = loadActiveProject();
  if (active) {
    State.project = migrateProject(active);
    saveProject(State.project);
    State.view = 'brain';
  } else {
    State.view = 'welcome';
  }
  render();
})();
</script>
</body>
</html>
