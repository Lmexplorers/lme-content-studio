<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LME Studio – Book & Materials Builder</title>
<meta name="description" content="LME Studio: build Montessori books, workbooks, cards, timelines and curriculum-linked content for Little Montessori Explorers.">
<link rel="alternate" hreflang="no" href="/no/">
<link rel="alternate" hreflang="en" href="/en/">
<style>
  :root {
    --pink-50:#FBEAF0; --pink-100:#F4C0D1; --pink-400:#D4537E; --pink-800:#72243E;
    --teal-50:#E1F5EE; --teal-600:#0F6E56;
    --gray-50:#F7F5EE; --gray-100:#F1EFE8; --gray-200:#D3D1C7; --gray-400:#888780; --gray-700:#444441; --gray-900:#2C2C2A;
    --amber-50:#FAEEDA; --amber-800:#633806;
    --bg:#FAF8F2;
    --surface:#FFFFFF;
    --border:rgba(0,0,0,0.08);
    --border-strong:rgba(0,0,0,0.16);
    --text:#2C2C2A;
    --text-muted:#666561;
    --text-subtle:#9A9893;
    --radius-sm:6px;
    --radius-md:8px;
    --radius-lg:12px;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  /* ============ LAYOUT ============ */
  .app{display:grid;grid-template-columns:220px 1fr;height:100vh}
  .rail{background:var(--surface);border-right:0.5px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
  .rail-brand{padding:6px 8px 14px;border-bottom:0.5px solid var(--border);margin-bottom:10px}
  .rail-brand-title{font-size:13px;font-weight:600;color:var(--pink-800);letter-spacing:0.2px}
  .rail-brand-sub{font-size:10px;color:var(--text-subtle);margin-top:2px}
  .rail-section{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-subtle);padding:8px 8px 4px}
  .rail-item{font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);color:var(--text-muted);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:none;background:transparent;text-align:left;width:100%}
  .rail-item:hover{background:var(--gray-100);color:var(--text)}
  .rail-item.active{background:var(--pink-50);color:var(--pink-800);font-weight:500}
  .rail-item.disabled{opacity:0.45;cursor:not-allowed}
  .rail-item .badge{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--gray-100);color:var(--text-subtle)}
  .rail-spacer{flex:1}

  .main{overflow-y:auto;padding:24px 32px;max-width:100%}
  .pane-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:0.5px solid var(--border);padding-bottom:12px;margin-bottom:20px}
  .pane-eyebrow{font-size:11px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.8px}
  .pane-title{font-size:22px;font-weight:500;margin:2px 0 0}
  .pane-actions{display:flex;gap:8px}

  /* ============ FORM ELEMENTS ============ */
  .field{margin-bottom:14px}
  .field-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:500;margin-bottom:4px}
  .field-hint{font-size:11px;color:var(--text-subtle);margin-top:2px}
  input[type=text],textarea,select{
    width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border-strong);
    border-radius:var(--radius-sm);background:var(--surface);color:var(--text);
    transition:border-color 0.15s
  }
  input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink-400);box-shadow:0 0 0 2px var(--pink-50)}
  textarea{resize:vertical;min-height:60px;line-height:1.5}
  .row{display:grid;gap:12px}
  .row-2{grid-template-columns:1fr 1fr}
  .row-3{grid-template-columns:1fr 1fr 1fr}

  .seg{display:inline-flex;background:var(--gray-100);border-radius:var(--radius-sm);padding:2px;gap:2px}
  .seg button{padding:5px 10px;font-size:12px;border:none;background:transparent;border-radius:4px;color:var(--text-muted)}
  .seg button.on{background:var(--surface);color:var(--text);font-weight:500;box-shadow:var(--shadow-sm)}

  .btn{padding:7px 13px;font-size:13px;border:0.5px solid var(--border-strong);background:var(--surface);
       color:var(--text);border-radius:var(--radius-sm);transition:all 0.15s}
  .btn:hover{background:var(--gray-100)}
  .btn-primary{background:var(--pink-400);color:#fff;border-color:var(--pink-400)}
  .btn-primary:hover{background:var(--pink-800);border-color:var(--pink-800)}
  .btn-ghost{border:none;color:var(--text-muted);padding:5px 8px}
  .btn-ghost:hover{background:var(--gray-100)}
  .btn-sm{padding:4px 8px;font-size:11px}

  /* ============ CARDS ============ */
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:16px}
  .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .card-title{font-size:14px;font-weight:500;margin:0}
  .card-sub{font-size:11px;color:var(--text-subtle);margin:2px 0 0}

  .pill{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:10px;background:var(--gray-100);color:var(--text-muted);font-weight:500}
  .pill-pink{background:var(--pink-50);color:var(--pink-800)}
  .pill-teal{background:var(--teal-50);color:var(--teal-600)}
  .pill-amber{background:var(--amber-50);color:var(--amber-800)}

  /* ============ DASHBOARD STATS ============ */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .stat{background:var(--gray-50);padding:12px;border-radius:var(--radius-md)}
  .stat-label{font-size:10px;text-transform:uppercase;color:var(--text-subtle);letter-spacing:0.6px}
  .stat-value{font-size:18px;font-weight:500;margin-top:3px}

  /* ============ PAGE PLANNER ============ */
  .pages{display:flex;flex-direction:column;gap:8px}
  .page-row{display:grid;grid-template-columns:48px 1fr auto;gap:14px;padding:12px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);align-items:start}
  .page-num{font-size:18px;font-weight:500;color:var(--text-subtle);text-align:center;padding-top:2px}
  .page-num small{display:block;font-size:9px;text-transform:uppercase;color:var(--text-subtle);letter-spacing:0.5px;font-weight:400}
  .page-content{display:flex;flex-direction:column;gap:6px;min-width:0}
  .page-title-input{font-weight:500;font-size:13px;border:none;padding:2px 0;background:transparent}
  .page-title-input:focus{outline:none;border-bottom:1px solid var(--pink-400)}
  .page-body-input{font-size:12px;color:var(--text-muted);border:none;padding:0;background:transparent;resize:none;min-height:0;line-height:1.5}
  .page-body-input:focus{outline:none}
  .page-prompt{display:flex;flex-direction:column;gap:4px;padding-top:6px;margin-top:4px;border-top:0.5px dashed var(--border)}
  .page-prompt-label{font-size:9px;text-transform:uppercase;color:var(--text-subtle);letter-spacing:0.6px;display:flex;justify-content:space-between;align-items:center}
  .page-prompt-text{font-size:11px;color:var(--text-muted);font-style:italic;background:var(--amber-50);padding:6px 8px;border-radius:4px;line-height:1.45}
  .page-actions{display:flex;flex-direction:column;gap:4px}

  /* ============ WORKBOOK OUTLINE ============ */
  .activity-row{display:grid;grid-template-columns:32px 1fr auto;gap:10px;padding:10px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);align-items:center;margin-bottom:6px}
  .activity-num{font-size:11px;font-weight:600;color:var(--text-subtle)}
  .activity-text{font-size:12px}
  .activity-text input{border:none;background:transparent;width:100%;font-size:12px;padding:2px 0}
  .activity-text input:focus{outline:none;border-bottom:1px solid var(--pink-400)}

  /* ============ EMPTY STATES ============ */
  .empty{padding:32px 20px;text-align:center;color:var(--text-muted);background:var(--gray-50);border-radius:var(--radius-md);font-size:13px}
  .empty strong{display:block;margin-bottom:4px;color:var(--text);font-weight:500}

  /* ============ MODAL / SHEET ============ */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
  .sheet{background:var(--surface);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
  .sheet-title{font-size:16px;font-weight:500;margin:0 0 4px}
  .sheet-sub{font-size:12px;color:var(--text-muted);margin:0 0 18px}

  /* ============ EXPORT ============ */
  .export-box{background:var(--gray-900);color:#E5E2D8;font-family:"SF Mono","Menlo",monospace;font-size:11px;padding:14px;border-radius:var(--radius-md);max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-word;line-height:1.5}

  /* ============ BILINGUAL TOGGLE ============ */
  .lang-tabs{display:flex;gap:0;margin-bottom:8px;border-bottom:0.5px solid var(--border)}
  .lang-tab{padding:6px 12px;font-size:11px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px}
  .lang-tab.on{color:var(--text);border-bottom-color:var(--pink-400);font-weight:500}

  /* ============ TOAST ============ */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gray-900);color:#fff;padding:10px 18px;border-radius:var(--radius-md);font-size:13px;z-index:200;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  /* ============ VISUAL STUDIO ============ */
  .preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
  .preset-card{
    border:0.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;
    background:var(--surface);cursor:pointer;transition:all 0.15s
  }
  .preset-card:hover{border-color:var(--border-strong);background:var(--gray-50)}
  .preset-card.on{border:1px solid var(--pink-400);background:var(--pink-50)}

  .vs-page{padding:18px 20px}
  .prompt-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:0}
  .prompt-tab{
    padding:8px 14px;font-size:12px;border:none;background:transparent;color:var(--text-muted);
    cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:inherit
  }
  .prompt-tab:hover{color:var(--text);background:var(--gray-50)}
  .prompt-tab.on{color:var(--pink-800);border-bottom-color:var(--pink-400);font-weight:500;background:var(--pink-50)}
  .prompt-panel{padding:12px 0 4px}
  .prompt-text{
    background:var(--gray-50);border:0.5px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 12px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word;
    font-family:"SF Mono","Menlo","Consolas",monospace;color:var(--text);max-height:240px;overflow-y:auto
  }

  .asset-chip{
    display:inline-flex;align-items:center;gap:4px;padding:4px 4px 4px 10px;
    background:var(--teal-50);color:var(--teal-600);border-radius:12px;font-size:12px;font-weight:500
  }
  .asset-chip button{
    background:transparent;border:none;color:var(--teal-600);font-size:14px;line-height:1;
    padding:0 6px;cursor:pointer;border-radius:50%;font-family:inherit
  }
  .asset-chip button:hover{background:rgba(15,110,86,0.15)}

  .asset-link-row{
    display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer
  }
  .asset-link-row:hover{background:var(--gray-50)}
  .asset-link-row input[type=checkbox]{margin:0}

  /* ============ MATERIALS BUILDER ============ */
  .material-card{padding:16px 20px}
  .card-item-row{
    display:grid;grid-template-columns:32px 1fr auto;gap:10px;
    padding:12px;background:var(--gray-50);border-radius:var(--radius-sm);
    margin-bottom:8px;align-items:start
  }
  .card-item-num{font-size:14px;font-weight:500;color:var(--text-subtle);padding-top:24px;text-align:center}
  .guide-section{margin-bottom:12px}
  .guide-section textarea{font-size:12px;line-height:1.5}
  .sort-cat{
    display:inline-flex;align-items:center;gap:4px;padding:4px 4px 4px 8px;
    background:var(--pink-50);border-radius:var(--radius-sm);
    border:0.5px solid var(--pink-100)
  }
  .sort-cat input{
    background:transparent;border:none;padding:2px 4px;font-size:12px;
    color:var(--pink-800);font-weight:500;width:120px
  }
  .sort-cat input:focus{outline:none;background:var(--surface);border-radius:3px}
  .sort-cat button{background:transparent;border:none;color:var(--pink-800);cursor:pointer;padding:0 4px}

  /* ============ CURRICULUM ENGINE ============ */
  .curriculum-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin:18px 0 14px}
  .ct-tab{
    padding:8px 16px;font-size:13px;border:none;background:transparent;color:var(--text-muted);
    cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:inherit
  }
  .ct-tab:hover{color:var(--text);background:var(--gray-50)}
  .ct-tab.on{color:var(--pink-800);border-bottom-color:var(--pink-400);font-weight:500}

  .curriculum-area{
    background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);
    margin-bottom:8px;overflow:hidden
  }
  .curriculum-area-head{
    width:100%;padding:14px 16px;background:transparent;border:none;text-align:left;
    cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit
  }
  .curriculum-area-head:hover{background:var(--gray-50)}
  .curriculum-area-body{padding:8px 16px 16px;border-top:0.5px solid var(--border)}

  .task-row{
    display:flex;gap:12px;align-items:flex-start;padding:12px;
    background:var(--gray-50);border-radius:var(--radius-sm);margin-bottom:6px
  }
  .task-row.linked{background:var(--pink-50);border:0.5px solid var(--pink-100)}

  .linked-row{
    display:flex;gap:8px;align-items:flex-start;padding:10px 12px;
    background:var(--gray-50);border-radius:var(--radius-sm);margin-bottom:6px
  }

  /* ============ TIMELINE BUILDER ============ */
  .timeline-template-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px
  }
  .timeline-tpl-card{
    border:0.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;
    background:var(--surface);cursor:pointer;transition:all 0.15s
  }
  .timeline-tpl-card:hover{border-color:var(--pink-400);background:var(--pink-50)}

  .timeline-card{padding:16px 20px}
  .timeline-panel-row{
    display:grid;grid-template-columns:60px 1fr auto;gap:10px;
    padding:14px;background:var(--gray-50);border-radius:var(--radius-sm);
    margin-bottom:10px;align-items:start
  }
  .panel-num{
    text-align:center;font-size:18px;font-weight:500;color:var(--text-subtle);
    display:flex;flex-direction:column;align-items:center;gap:4px
  }
  .panel-move{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .panel-move button{padding:2px 6px;font-size:11px}
</style>
</head>
<body>
<div class="app">
  <nav class="rail" id="rail"></nav>
  <main class="main" id="main"></main>
</div>
<div id="sheetRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   LME STUDIO — BOOK & MATERIALS BUILDER (MVP)
   Architecture: state.js | render.js | actions.js | persistence.js
   All concerns kept separate inside this single file for clarity.
   Schema versioned from v1.0 — future migrations live in migrations.js.
===================================================================== */

const SCHEMA_VERSION = '1.6.0';

/* =====================================================================
   1. CONSTANTS — locked characters, book types, curriculum scaffolds
===================================================================== */

const LOCKED_CHARACTERS = {
  mia: {
    id: 'mia',
    name: 'Mia',
    age: 6,
    appearance: 'long golden blonde hair in high ponytail, blue eyes, light skin',
    outfit: 'pink dress with small white flowers, pink sandals, white socks',
    props: 'small woven basket',
    style: 'Pixar/Disney 3D animation style, friendly warm expression',
    consistency: 'Always 6 years old. Hair always in high ponytail. Pink dress is signature.'
  },
  teo: {
    id: 'teo',
    name: 'Teo',
    age: 6,
    appearance: 'short light brown slightly tousled hair, brown eyes, light skin',
    outfit: 'yellow striped t-shirt, blue shorts, brown shoes',
    props: 'brown leather backpack',
    style: 'Pixar/Disney 3D animation style, curious bright expression',
    consistency: 'Always 6 years old. Best friends with Mia, not siblings. Backpack is signature.'
  }
};

const BOOK_TYPES = [
  { id:'picture', label:'Picture book', defaultPages:24 },
  { id:'reading', label:'Reading book', defaultPages:32 },
  { id:'leveled', label:'Leveled reader', defaultPages:24 },
  { id:'whoami', label:'"Who Am I?" book', defaultPages:24 },
  { id:'science', label:'Science book', defaultPages:32 },
  { id:'bilingual', label:'Bilingual book', defaultPages:32 },
  { id:'chapter', label:'Chapter book', defaultPages:64 },
  { id:'printable', label:'Printable book', defaultPages:24 }
];

const PAGE_COUNTS = [24, 32, 64];

const AGE_GROUPS = [
  { id:'3-6', label:'3–6 years' },
  { id:'6-9', label:'6–9 years' },
  { id:'9-12', label:'9–12 years' }
];

const LANGUAGES = [
  { id:'no', label:'Norsk' },
  { id:'en', label:'English' },
  { id:'bilingual', label:'Bilingual NO+EN' }
];

const AMI_AREAS = ['Praktisk liv','Sansetrening','Språk','Matematikk','Kosmisk','Zoologi','Botanikk','Geografi','Historie'];
const LK20_SUBJECTS = ['Biologi','Geografi','Historie og samfunn','Religion, livssyn og etikk','Norsk','Aritmetikk og algebra','Geometri','Engelsk','Kunst og håndverk','Musikk','Kroppsøving og fysisk aktivitet','Mat og helse'];

/* ---------- CURRICULUM ENGINE: AMI MONTESSORI DATABASE ---------- */
/* Curated task library mapped by area × age group. Each task is shaped
   to plug straight into a Project Brain — title, aim, vocabulary,
   suggested material types, and extensions are all consumable by the
   curriculum view, the brain dashboard, and the materials builder.
   Tasks are written for LME's bilingual audience (NO + EN labels). */

const AMI_TASKS = {
  'Praktisk liv': {
    '3-6': [
      { id:'pl_3_pour', title:'Pouring water', titleNo:'Helle vann', aim:'Coordination, concentration, independence at meals.', aimIndirect:'Preparation for writing through wrist control.', vocabulary:['kanne','glass','vann','helle','tørke'], materials:['threePartCard'], extensions:['Pour rice instead of water','Pour through a funnel','Practice serving water to a friend'] },
      { id:'pl_3_button', title:'Buttoning frame', titleNo:'Knappe-ramme', aim:'Independent dressing, fine motor control.', aimIndirect:'Sequencing, problem solving.', vocabulary:['knapp','knappehull','jakke','skjorte'], materials:['nomenclatureCard'], extensions:['Try real clothes','Sort buttons by size','Sew a button onto fabric'] },
      { id:'pl_3_polish', title:'Polishing a mirror', titleNo:'Pusse speil', aim:'Care of the environment, sustained attention.', aimIndirect:'Order, sequence of steps.', vocabulary:['speil','klut','pusse','blank','flekk'], materials:['threePartCard'], extensions:['Polish brass','Polish a leaf','Clean a window'] },
      { id:'pl_3_flowers', title:'Flower arranging', titleNo:'Blomsterarrangement', aim:'Aesthetic awareness, care of beauty.', aimIndirect:'Estimation, balance.', vocabulary:['vase','blomst','stilk','kniv','vann'], materials:['nomenclatureCard'], extensions:['Press flowers','Identify wild flowers outside','Draw the bouquet'] },
      { id:'pl_3_sweep', title:'Sweeping', titleNo:'Feie', aim:'Care of the environment, gross motor coordination.', aimIndirect:'Awareness of dust, awareness of edges.', vocabulary:['kost','feiebrett','støv','samle','tømme'], materials:['threePartCard'], extensions:['Sweep outside','Sort what was swept up','Compost organic dust'] },
      { id:'pl_3_grace', title:'Grace and courtesy: greeting', titleNo:'Høflighet: hilsen', aim:'Social awareness, confidence in interactions.', aimIndirect:'Voice modulation, eye contact.', vocabulary:['hei','hallo','god morgen','takk','vær så god'], materials:['labelOnly'], extensions:['Greet in different languages','Practice greeting elders','Role-play meeting a new friend'] }
    ],
    '6-9': [
      { id:'pl_6_cook', title:'Simple cooking — bread', titleNo:'Enkel matlaging — brød', aim:'Independence, sequence of long tasks, mathematics in measurement.', aimIndirect:'Chemistry, fractions, time awareness.', vocabulary:['mel','gjær','vann','salt','elte','heve','steke'], materials:['threePartCard','teacherGuide'], extensions:['Try a bread from another country','Calculate doubled recipe','Sell at a school market'] },
      { id:'pl_6_sew', title:'Sewing a project', titleNo:'Sy et prosjekt', aim:'Sustained focus, planning, useful production.', aimIndirect:'Geometry, fractions when measuring.', vocabulary:['nål','tråd','sting','sakse','mønster','stoff'], materials:['threePartCard'], extensions:['Design a stuffed animal','Mend something at home','Embroider initials'] },
      { id:'pl_6_garden', title:'Caring for a garden bed', titleNo:'Stelle et hagebed', aim:'Responsibility, observation over time.', aimIndirect:'Botany, weather patterns, journaling.', vocabulary:['frø','jord','vann','luke','spire','høste'], materials:['threePartCard','teacherGuide'], extensions:['Keep a growth journal','Save seeds for next year','Cook with what was harvested'] }
    ],

/* ---------- HELPERS ---------- */
/* Flatten the nested AMI/LK20 databases into searchable lookup tables. */
function getAllAmiTasks() {
  const list = [];
  Object.keys(AMI_TASKS).forEach(area => {
    Object.keys(AMI_TASKS[area]).forEach(age => {
      AMI_TASKS[area][age].forEach(task => {
        list.push({ ...task, area, age });
      });
    });
  });
  return list;
}

function getAmiTaskById(id) {
  return getAllAmiTasks().find(t => t.id === id) || null;
}

function getAmiTasksFor(area, ageGroup) {
  if (!AMI_TASKS[area]) return [];
  return (AMI_TASKS[area][ageGroup] || []).map(t => ({ ...t, area, age: ageGroup }));
}

function getAllLk20Goals() {
  const list = [];
  Object.keys(LK20_GOALS).forEach(subject => {
    Object.keys(LK20_GOALS[subject]).forEach(stage => {
      LK20_GOALS[subject][stage].forEach(g => list.push({ ...g, subject, stage }));
    });
  });
  return list;
}

function getLk20GoalById(id) {
  return getAllLk20Goals().find(g => g.id === id) || null;
}

/* Resolve a stage id ('1'/'2') to its display label from LK20_STAGES. */
function stageLabelFor(stageId) {
  const found = LK20_STAGES.find(s => s.id === stageId);
  return found ? found.label : stageId;
}

function getLk20GoalsFor(subject, stage) {
  if (!LK20_GOALS[subject]) return [];
  return (LK20_GOALS[subject][stage] || []).map(g => ({ ...g, subject, stage }));
}

/* Lightweight template substitution for {placeholders} */
function t(key, vars) {
  const lang = (State && State.ui && State.ui.lang) || 'no';
  const dict = I18N_STRINGS[lang] || I18N_STRINGS.no;
  let s = dict[key] || I18N_STRINGS.en[key] || key;
  if (vars) {
    Object.keys(vars).forEach(k => {
      s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]);
    });
  }
  return s;
}

/* ---------- SERIES ENGINE: APPLY SERIES TO PROJECT ---------- */
/* Apply a series template to a project. Defaults overwrite empty fields
   only — never destroys user-entered data. Seeds (assets, curriculum)
   are merged in, not replaced. */

function applySeriesToProject(project, series, options) {
  const opts = Object.assign({
    overwriteDefaults: false,
    mergeAssets: true,
    mergeCurriculum: true,
    mergeStyle: true
  }, options || {});

  if (!project || !series) return project;

  project.seriesId = series.id;

  if (opts.overwriteDefaults || !project.meta.bookType) project.meta.bookType = series.defaults.bookType;
  if (opts.overwriteDefaults || !project.meta.pageCount) project.meta.pageCount = series.defaults.pageCount;
  if (opts.overwriteDefaults || !project.meta.ageGroup) project.meta.ageGroup = series.defaults.ageGroup;
  if (opts.overwriteDefaults || !project.meta.language) project.meta.language = series.defaults.language;
  if (opts.overwriteDefaults || !project.meta.topic) project.meta.topic = series.defaults.topic || project.meta.topic;

  if (opts.mergeStyle) {
    project.visualStudio = project.visualStudio || {};
    if (!project.visualStudio.defaultPreset || project.visualStudio.defaultPreset === 'watercolor') {
      project.visualStudio.defaultPreset = series.style.defaultPreset;
    }
    if (!project.visualStudio.defaultFormat || project.visualStudio.defaultFormat === 'dalle') {
      project.visualStudio.defaultFormat = series.style.defaultPromptFormat;
    }
    project.exportSettings = project.exportSettings || {};
    if (!project.exportSettings.imageStyle) {
      project.exportSettings.imageStyle = series.style.imageStyle;
    }
  }

  if (opts.overwriteDefaults) {
    project.characters.useMia = series.characters.useMia;
    project.characters.useTeo = series.characters.useTeo;
  }

  if (opts.mergeCurriculum) {
    const c = project.curriculum;
    series.curriculum.amiAreas.forEach(a => { if (!c.amiAreas.includes(a)) c.amiAreas.push(a); });
    series.curriculum.lk20Subjects.forEach(s => { if (!c.lk20Subjects.includes(s)) c.lk20Subjects.push(s); });
    c.linkedTasks = c.linkedTasks || [];
    c.linkedGoals = c.linkedGoals || [];
    series.curriculum.defaultLinkedTaskIds.forEach(id => {
      if (!c.linkedTasks.includes(id)) {
        c.linkedTasks.push(id);
        const task = typeof getAmiTaskById === 'function' ? getAmiTaskById(id) : null;
        if (task) {
          const existing = (c.vocabulary || '').split('\n').map(w => w.trim()).filter(Boolean);
          task.vocabulary.forEach(w => { if (!existing.includes(w)) existing.push(w); });
          c.vocabulary = existing.join('\n');
        }
      }
    });
    series.curriculum.defaultLinkedGoalIds.forEach(id => {
      if (!c.linkedGoals.includes(id)) c.linkedGoals.push(id);
    });
  }

  if (opts.mergeAssets) {
    Object.keys(series.assetSeeds || {}).forEach(category => {
      project.assetLibrary[category] = project.assetLibrary[category] || [];
      const existingLabels = new Set(project.assetLibrary[category].map(a => a.label.toLowerCase()));
      (series.assetSeeds[category] || []).forEach(seed => {
        if (!existingLabels.has(seed.label.toLowerCase())) {
          project.assetLibrary[category].push({
            id: 'asset_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,5),
            label: seed.label,
            description: seed.description || ''
          });
        }
      });
    });
  }

  return project;
}

function getProjectsInSeries(seriesId) {
  if (!seriesId) return [];
  const all = loadAllProjects();
  return Object.values(all).filter(p => p.seriesId === seriesId);
}

/* =====================================================================
   3. PERSISTENCE — localStorage, no images here
===================================================================== */

const STORAGE_KEY = 'lme_studio_projects_en';
const ACTIVE_KEY = 'lme_studio_active_en';
const SERIES_KEY = 'lme_studio_series_en_v2';
const LIBRARY_WORKSPACE_KEY = 'lme_studio_library_workspace_en';

/* Returns the current "active context" — a real project if one is open,
   otherwise a synthetic library-workspace project that holds standalone
   materials, timelines, asset-library, and curriculum. This lets users
   build materials without first creating a book. */
function getActiveContext() {
  if (State.project) return State.project;
  return loadOrCreateLibraryWorkspace();
}

function loadOrCreateLibraryWorkspace() {
  let ws;
  try {
    const raw = localStorage.getItem(LIBRARY_WORKSPACE_KEY);
    if (raw) {
      ws = JSON.parse(raw);
      ws = migrateProject(ws);
    }
  } catch { ws = null; }
  if (!ws) {
    ws = newProject({
      title: '',
      bookType: 'picture',
      pageCount: 24,
      ageGroup: '3-6',
      language: 'en'
    });
    ws.id = '__library_workspace__';
    ws.isLibraryWorkspace = true;
    /* Library workspace doesn't need book-level fields populated — these are visual-only. */
    saveLibraryWorkspace(ws);
  }
  ws.isLibraryWorkspace = true;
  return ws;
}

function saveLibraryWorkspace(ws) {
  if (!ws) return;
  ws.updatedAt = new Date().toISOString();
  try {
    localStorage.setItem(LIBRARY_WORKSPACE_KEY, JSON.stringify(ws));
  } catch (e) {
    toast(t('toastSaveFail'));
  }
}

/* Saves whichever context is currently active — a real project goes
   through saveProject, the library workspace through saveLibraryWorkspace. */
function saveActiveContext(ctx) {
  if (!ctx) return;
  if (ctx.isLibraryWorkspace) saveLibraryWorkspace(ctx);
  else saveProject(ctx);
}

function loadAllProjects() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
}

function saveProject(project) {
  if (!project) return;
  /* The library workspace is a synthetic project — route it to its own storage
     so it doesn't show up in the All Projects list. */
  if (project.isLibraryWorkspace) {
    saveLibraryWorkspace(project);
    return;
  }
  project.updatedAt = new Date().toISOString();
  const all = loadAllProjects();
  all[project.id] = project;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    localStorage.setItem(ACTIVE_KEY, project.id);
  } catch (e) {
    toast(t('toastSaveFail'));
  }
}

function loadActiveProject() {
  const id = localStorage.getItem(ACTIVE_KEY);
  if (!id) return null;
  const all = loadAllProjects();
  return all[id] ? migrateProject(all[id]) : null;
}

/* Forward migrations — additive only. Each step bumps schemaVersion and
   adds missing fields with safe defaults. Never removes data. */
function migrateProject(p) {
  if (!p) return p;
  if (!p.schemaVersion || p.schemaVersion === '1.0.0') {
    p.visualStudio = p.visualStudio || { defaultPreset:'watercolor', defaultFormat:'dalle', lastBatchAt:null };
    p.assetLibrary = p.assetLibrary || { animals:[], plants:[], insects:[], props:[], backgrounds:[], textures:[] };
    if (Array.isArray(p.pages)) {
      p.pages.forEach(pg => {
        if (!pg.promptSet) pg.promptSet = null;
        if (!pg.preset) pg.preset = ROLE_PRESET_DEFAULTS[pg.role] || 'watercolor';
        if (!pg.assetRefs) pg.assetRefs = [];
      });
    }
    p.schemaVersion = '1.1.0';
  }
  if (p.schemaVersion === '1.1.0') {
    /* Materials structure went from { cards:[], poster, timeline } to the full set.
       Preserve any old `cards` data by moving it into a default cardSet. */
    const oldCards = p.materials && Array.isArray(p.materials.cards) ? p.materials.cards : [];
    p.materials = {
      cardSets: oldCards.length ? [{
        id: 'cardset_legacy',
        title: 'Imported cards',
        type: 'three-part',
        items: oldCards
      }] : [],
      labels: (p.materials && p.materials.labels) || [],
      definitions: (p.materials && p.materials.definitions) || [],
      sortingMats: (p.materials && p.materials.sortingMats) || [],
      teacherGuides: (p.materials && p.materials.teacherGuides) || [],
      certificates: (p.materials && p.materials.certificates) || [],
      poster: (p.materials && p.materials.poster) || null,
      timeline: (p.materials && p.materials.timeline) || null
    };
    p.schemaVersion = '1.2.0';
  }
  if (p.schemaVersion === '1.2.0') {
    p.curriculum = p.curriculum || {};
    if (!Array.isArray(p.curriculum.linkedTasks)) p.curriculum.linkedTasks = [];
    if (!Array.isArray(p.curriculum.linkedGoals)) p.curriculum.linkedGoals = [];
    p.schemaVersion = '1.3.0';
  }
  if (p.schemaVersion === '1.3.0') {
    p.materials = p.materials || {};
    if (!Array.isArray(p.materials.timelines)) p.materials.timelines = [];
    p.schemaVersion = '1.4.0';
  }
  if (p.schemaVersion === '1.4.0') {
    if (p.seriesId === undefined) p.seriesId = null;
    p.schemaVersion = '1.5.0';
  }
  if (p.schemaVersion === '1.5.0') {
    /* LK20 → LMS 2020 transition. Old goal IDs (no_*, ma_*, sa_*, nat_*, kh_*)
       and old subject names (Naturfag, Samfunnsfag, KRLE, Matematikk) no longer
       exist. Strip them so the curriculum view stays clean. */
    p.curriculum = p.curriculum || {};
    if (Array.isArray(p.curriculum.linkedGoals)) {
      p.curriculum.linkedGoals = p.curriculum.linkedGoals.filter(id =>
        typeof id === 'string' && id.startsWith('lms_'));
    }
    if (Array.isArray(p.curriculum.lk20Subjects)) {
      const validSubjects = ['Biologi','Geografi','Historie og samfunn','Religion, livssyn og etikk','Norsk','Aritmetikk og algebra','Geometri','Engelsk','Kunst og håndverk','Musikk','Kroppsøving og fysisk aktivitet','Mat og helse'];
      p.curriculum.lk20Subjects = p.curriculum.lk20Subjects.filter(s => validSubjects.includes(s));
    }
    p.schemaVersion = '1.6.0';
  }
  return p;
}

function deleteProject(id) {
  const all = loadAllProjects();
  delete all[id];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  if (localStorage.getItem(ACTIVE_KEY) === id) localStorage.removeItem(ACTIVE_KEY);
}

/* ---------- SERIES ENGINE: PERSISTENCE ---------- */
/* Series live separately from projects so they persist across creations.
   On first boot, builtin series are seeded into storage if not already there. */

function loadAllSeries() {
  try {
    return JSON.parse(localStorage.getItem(SERIES_KEY) || '{}');
  } catch { return {}; }
}

function saveSeries(series) {
  if (!series) return;
  series.updatedAt = new Date().toISOString();
  const all = loadAllSeries();
  all[series.id] = series;
  try {
    localStorage.setItem(SERIES_KEY, JSON.stringify(all));
  } catch (e) {
    toast(t('toastSaveFail'));
  }
}

function deleteSeriesById(id) {
  const all = loadAllSeries();
  delete all[id];
  localStorage.setItem(SERIES_KEY, JSON.stringify(all));
  /* Unlink any projects that pointed here */
  const allProj = loadAllProjects();
  Object.values(allProj).forEach(p => {
    if (p.seriesId === id) {
      p.seriesId = null;
      allProj[p.id] = p;
    }
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(allProj));
}

function getSeriesById(id) {
  if (!id) return null;
  const all = loadAllSeries();
  return all[id] || null;
}

function seedBuiltinSeries() {
  const all = loadAllSeries();
  let changed = false;
  BUILTIN_SERIES.forEach(b => {
    if (!all[b.id]) {
      const series = newSeries(b);
      series.id = b.id;
      series.isBuiltin = true;
      Object.assign(series, {
        name: b.name,
        nameNo: b.nameNo,
        description: b.description,
        coverNote: b.coverNote,
        defaults: b.defaults,
        style: b.style,
        characters: b.characters,
        curriculum: b.curriculum,
        assetSeeds: b.assetSeeds,
        roster: b.roster,
        layoutRules: b.layoutRules
      });
      all[b.id] = series;
      changed = true;
    }
  });
  if (changed) {
    try { localStorage.setItem(SERIES_KEY, JSON.stringify(all)); } catch {}
  }
}

/* =====================================================================
   4. ACTIONS — all state mutations go through here, then render()
===================================================================== */

const Actions = {
  setView(view) {
    /* Standalone tool views work with or without a real project. If no project is
       open, transparently load the library workspace so they have somewhere to
       store their data. The four standalone tools below share one persistent
       workspace stored in localStorage under LIBRARY_WORKSPACE_KEY. */
    const STANDALONE_TOOLS = ['materials', 'timelines', 'assetLibrary', 'curriculum'];
    const BOOK_VIEWS = ['brain', 'pages', 'visualStudio', 'workbook', 'export'];
    if (STANDALONE_TOOLS.includes(view) && !State.project) {
      State.project = loadOrCreateLibraryWorkspace();
    }
    /* If user navigates away from book-only views or to a true library view,
       and the current "project" is just the library workspace, unload it so the
       Brain/Pages/etc. don't try to render the workspace as a real book. */
    if ((view === 'library' || view === 'characters' || view === 'seriesLibrary') &&
        State.project && State.project.isLibraryWorkspace) {
      saveLibraryWorkspace(State.project);
      State.project = null;
    }
    State.view = view;
    render();
  },

  setLanguage(lang) {
    if (lang === 'no') {
      window.location.href = '/no/';
      return;
    }
    /* No-op: this build is locked to English. */
  },

  newProject(seed) {
    State.project = newProject(seed);
    saveProject(State.project);
    State.view = 'brain';
    render();
  },

  loadProject(id) {
    const all = loadAllProjects();
    if (all[id]) {
      State.project = migrateProject(all[id]);
      saveProject(State.project);
      localStorage.setItem(ACTIVE_KEY, id);
      State.view = 'brain';
      render();
    }
  },

  updateMeta(field, value) {
    if (!State.project) return;
    State.project.meta[field] = value;
    if (field === 'pageCount') {
      const n = parseInt(value, 10);
      if (n && n !== State.project.pages.length) {
        Actions.regeneratePages(n);
        return;
      }
    }
    saveProject(State.project);
    render();
  },

  toggleCharacter(id) {
    if (!State.project) return;
    const key = id === 'mia' ? 'useMia' : 'useTeo';
    State.project.characters[key] = !State.project.characters[key];
    saveProject(State.project);
    render();
  },

  toggleAmiArea(area) {
    if (!State.project) return;
    const arr = State.project.curriculum.amiAreas;
    const i = arr.indexOf(area);
    if (i >= 0) arr.splice(i,1); else arr.push(area);
    saveProject(State.project);
    render();
  },

  toggleLk20Subject(subj) {
    if (!State.project) return;
    const arr = State.project.curriculum.lk20Subjects;
    const i = arr.indexOf(subj);
    if (i >= 0) arr.splice(i,1); else arr.push(subj);
    saveProject(State.project);
    render();
  },

    const idx = tl.panels.findIndex(p => p.id === panelId);
    if (idx < 0) return;
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= tl.panels.length) return;
    const tmp = tl.panels[idx];
    tl.panels[idx] = tl.panels[newIdx];
    tl.panels[newIdx] = tmp;
    tl.panels.forEach((p, i) => p.order = i);

  /* ---------- CURRICULUM ENGINE ---------- */
  linkAmiTask(taskId) {
    if (!State.project) return;
    const c = State.project.curriculum;
    c.linkedTasks = c.linkedTasks || [];
    if (c.linkedTasks.includes(taskId)) return;
    c.linkedTasks.push(taskId);
    /* Pull in vocabulary and area automatically */
    const task = getAmiTaskById(taskId);
    if (task) {
      if (!c.amiAreas.includes(task.area)) c.amiAreas.push(task.area);
      const existing = (c.vocabulary || '').split('\n').map(w => w.trim()).filter(Boolean);
      task.vocabulary.forEach(w => { if (!existing.includes(w)) existing.push(w); });
      c.vocabulary = existing.join('\n');
    }
    saveProject(State.project);
    render();
    toast(t('curLinkedToast', {title: task ? (task.titleNo || task.title) : taskId}));
  },

  unlinkAmiTask(taskId) {
    if (!State.project) return;
    const c = State.project.curriculum;
    c.linkedTasks = (c.linkedTasks || []).filter(t => t !== taskId);
    saveProject(State.project);
    render();
  },

    if (!State.project) return;
    const c = State.project.curriculum;
    c.linkedGoals = c.linkedGoals || [];
    if (c.linkedGoals.includes(goalId)) return;
    c.linkedGoals.push(goalId);
    const goal = getLk20GoalById(goalId);
    if (goal && !c.lk20Subjects.includes(goal.subject)) {
      c.lk20Subjects.push(goal.subject);
    }
    saveProject(State.project);
    render();
    toast(t('curLk20LinkedToast'));

    c.linkedGoals = (c.linkedGoals || []).filter(g => g !== goalId);
    saveProject(State.project);

  importTaskExtensions(taskId) {
    if (!State.project) return;
    const task = getAmiTaskById(taskId);
    if (!task) return;
    const c = State.project.curriculum;
    const lines = (c.extensionActivities || '').split('\n').filter(Boolean);
    task.extensions.forEach(e => {
      const formatted = '• ' + e;
      if (!lines.includes(formatted) && !lines.includes(e)) lines.push(formatted);
    });
    c.extensionActivities = lines.join('\n');
    saveProject(State.project);
    render();
    toast(t('curImportedExt', {title: task.titleNo || task.title}));

    if (!task) return;
    const c = State.project.curriculum;
    const existing = c.learningGoals || '';
    const addition = `\n\n${task.title}:\nDirect aim: ${task.aim}\nIndirect aim: ${task.aimIndirect}`;
    c.learningGoals = (existing + addition).trim();
    saveProject(State.project);
    render();
    toast(t('curImportedAim', {title: task.titleNo || task.title}));

  /* Generate suggested materials based on linked AMI tasks */
  generateMaterialsFromCurriculum() {
    if (!State.project) return;
    const c = State.project.curriculum;
    const linkedTasks = (c.linkedTasks || []).map(getAmiTaskById).filter(Boolean);
    if (linkedTasks.length === 0) {
      toast(t('curStaffNoLinkRequiredFirst'));
      return;
    }
    let created = 0;
    linkedTasks.forEach(task => {
      /* For each task, create a card set drawing from its vocabulary */
      const existingTitles = State.project.materials.cardSets.map(s => s.title);
      const title = `${task.titleNo || task.title} — Vokabular`;
      if (existingTitles.includes(title)) return;
      const set = {
        id: 'cardset_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,5),
        type: task.materials && task.materials[0] ? task.materials[0] : 'threePartCard',
        title,
        source: 'fromCurriculumTask',
        sourceCategory: null,
        ageGroup: task.age || State.project.meta.ageGroup,
        presetForImage: (MATERIAL_TYPES[task.materials && task.materials[0]] || MATERIAL_TYPES.threePartCard).presetForImage,
        createdAt: new Date().toISOString(),
        items: task.vocabulary.map((word, i) => ({
          id: 'item_curr_' + Date.now().toString(36) + '_' + i,
          label: word,
          labelEn: '',
          definition: '',
          classification: '',
          sourceAssetId: null,
          sourceCategory: null,
          imagePromptSet: null
        }))
      };
      State.project.materials.cardSets.push(set);
      created++;
    });
    saveProject(State.project);
    render();
    toast(t('curMaterialsToast', {n: created, s: created===1 ? '' : (State.ui.lang==='no' ? '' : 's')}));
  },

  generateWorkbookOutline() {
    if (!State.project) return;
    State.project.workbook.activities = scaffoldWorkbook(State.project);
    saveProject(State.project);
    render();
    toast(t('toastWbGenerated'));
  },

  updateActivity(idx, value) {
    if (!State.project) return;
    State.project.workbook.activities[idx].text = value;
    saveProject(State.project);
  },

  setUiLang(lang) { State.ui.lang = lang; render(); },

  exportPromptPack() {
    if (!State.project) return;
    showSheet('export', { project: State.project });
  },

  downloadJson() {
    if (!State.project) return;
    const blob = new Blob([JSON.stringify(State.project, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (State.project.meta.title || 'lme-project').replace(/[^a-z0-9]+/gi,'-').toLowerCase() + '.lmestudio.json';
    a.click();
    URL.revokeObjectURL(url);
  },

  importJson(text) {
    try {
      const data = JSON.parse(text);
      if (!data.schemaVersion || !data.meta) throw new Error('Not a valid LME Studio project');
      data.id = 'proj_' + Date.now().toString(36);
      State.project = migrateProject(data);
      saveProject(State.project);
      State.view = 'brain';
      closeSheet();
      render();
      toast(t('impSuccessToast'));
    } catch (e) {
      toast(t('impFailToast', {msg: e.message}));
    }
  },

  deleteCurrentProject() {
    if (!State.project) return;
    if (!confirm(t('confirmDeleteProject'))) return;
    deleteProject(State.project.id);
    State.project = null;
    State.view = 'library';
    render();
  }
};

function scaffoldPages(project) {
  const n = project.meta.pageCount;
  const pages = [];
  const mk = (index, role, title, body, layout) => ({
    index, role, title, body, layout,
    imagePrompt: '',
    promptSet: null,
    preset: ROLE_PRESET_DEFAULTS[role] || 'watercolor',
    assetRefs: []
  });

  pages.push(mk(0, 'cover', 'Cover', '', 'cover'));
  pages.push(mk(1, 'frontmatter', 'Title page', '', 'title'));
  pages.push(mk(2, 'frontmatter', 'Copyright', '© Little Montessori Explorers', 'text'));

  const reservedFront = 3;
  const reservedBack = 3;
  const contentCount = n - reservedFront - reservedBack;

  for (let i = 0; i < contentCount; i++) {
    pages.push(mk(reservedFront + i, 'content', '', '', 'image-text'));
  }

  pages.push(mk(n-3, 'reflection', 'Reflect & remember', '', 'activity'));
  pages.push(mk(n-2, 'cta', 'Keep exploring', 'Find more from Little Montessori Explorers at lmexplorers.com', 'cta'));
  pages.push(mk(n-1, 'brand', 'Final brand page', 'Little Montessori Explorers · Mia & Teo', 'brand'));

  return pages;
}

/* ---------- VISUAL STUDIO: PROMPT BUILDERS ---------- */
/* Three layers:
   1. buildPromptParts — gathers all the raw ingredients from the project
   2. format-specific builders — assemble those parts into a string tuned
      for one generator (DALL·E sentences, Ideogram phrases, MJ flags)
   3. buildPromptSet — runs all four builders, returns the full set
*/

function buildPromptParts(project, page) {
  const preset = STYLE_PRESETS[page.preset] || STYLE_PRESETS.watercolor;
  const m = project.meta;

  /* Locked character clauses — exact appearance, never paraphrased */
  const characters = [];
  if (project.characters.useMia && pageMayShowCharacters(page)) {
    const c = LOCKED_CHARACTERS.mia;
    characters.push(`Mia, a ${c.age} year old girl with ${c.appearance}, wearing ${c.outfit}, carrying ${c.props}`);
  }
  if (project.characters.useTeo && pageMayShowCharacters(page)) {
    const c = LOCKED_CHARACTERS.teo;
    characters.push(`Teo, a ${c.age} year old boy with ${c.appearance}, wearing ${c.outfit}, with ${c.props}`);
  }

  /* Asset references — pulled from project's asset library by id */
  const assets = (page.assetRefs || []).map(ref => {
    const cat = (project.assetLibrary[ref.category] || []);
    const item = cat.find(a => a.id === ref.id);
    return item ? item.label : null;
  }).filter(Boolean);

  /* Composition guidance based on role */
  let composition = '';
  if (page.role === 'cover') {
    composition = 'book cover composition with clear title space at top, centered hero focal point';
  } else if (page.role === 'content') {
    composition = 'balanced editorial composition, focal subject offset to allow text on right side';
  } else if (page.role === 'reflection') {
    composition = 'soft activity-page composition, lighter mood, generous whitespace';
  } else {
    composition = 'centered balanced composition';
  }

  /* Audience and safety always last */
  const audience = `for children aged ${m.ageGroup} years`;
  const safety = 'child-safe, no text or letters in image';

  /* The actual scene description */
  const sceneText = page.title || page.body || m.topic || m.title || 'educational illustration';

  return {
    preset,
    presetClause: preset.styleClause,
    characters,
    charactersClause: characters.length ? characters.join(' and ') : '',
    assets,
    assetsClause: assets.length ? `featuring ${assets.join(', ')}` : '',
    composition,
    audience,
    safety,
    scene: sceneText,
    aspect: preset.aspect,
    project: { topic: m.topic, title: m.title, ageGroup: m.ageGroup }
  };
}

function pageMayShowCharacters(page) {
  return page.role === 'cover' || page.role === 'content' || page.role === 'reflection' || page.role === 'cta';
}

/* DALL·E 3 — natural sentences, descriptive, no flags */
function buildDallePrompt(parts) {
  const bits = [];
  bits.push(parts.presetClause + '.');
  bits.push('Scene: ' + parts.scene + '.');
  if (parts.charactersClause) bits.push('Show ' + parts.charactersClause + '.');
  if (parts.assetsClause) bits.push(capitalize(parts.assetsClause) + '.');
  bits.push(capitalize(parts.composition) + '.');
  bits.push('Audience: ' + parts.audience + '.');
  bits.push(capitalize(parts.safety) + '.');
  return bits.join(' ');
}

/* Ideogram — comma-separated phrases, style words first */
function buildIdeogramPrompt(parts) {
  const bits = [];
  bits.push(parts.presetClause);
  bits.push(parts.scene);
  if (parts.charactersClause) bits.push(parts.charactersClause);
  if (parts.assetsClause) bits.push(parts.assetsClause);
  bits.push(parts.composition);
  bits.push(parts.audience);
  bits.push(parts.safety);
  return bits.join(', ');
}

/* Midjourney v6 — comma-separated, with --ar and --style raw */
function buildMidjourneyPrompt(parts) {
  const bits = [];
  bits.push(parts.scene);
  if (parts.charactersClause) bits.push(parts.charactersClause);
  if (parts.assetsClause) bits.push(parts.assetsClause);
  bits.push(parts.presetClause);
  bits.push(parts.composition);
  bits.push(parts.safety);
  const main = bits.join(', ');
  return `${main} --ar ${parts.aspect} --style raw --v 6`;
}

/* Universal — readable for any tool, good for documentation */
function buildUniversalPrompt(parts) {
  const lines = [];
  lines.push(`STYLE: ${parts.presetClause}`);
  lines.push(`SCENE: ${parts.scene}`);
  if (parts.charactersClause) lines.push(`CHARACTERS: ${parts.charactersClause}`);
  if (parts.assetsClause) lines.push(`ASSETS: ${parts.assetsClause}`);
  lines.push(`COMPOSITION: ${parts.composition}`);
  lines.push(`AUDIENCE: ${parts.audience}`);
  lines.push(`SAFETY: ${parts.safety}`);
  lines.push(`ASPECT: ${parts.aspect}`);
  return lines.join('\n');
}

/* The full set — what gets stored on each page */
function buildPromptSet(project, page) {
  const parts = buildPromptParts(project, page);
  return {
    generatedAt: new Date().toISOString(),
    presetId: page.preset,
    aspect: parts.aspect,
    dalle: buildDallePrompt(parts),
    ideogram: buildIdeogramPrompt(parts),
    midjourney: buildMidjourneyPrompt(parts),
    universal: buildUniversalPrompt(parts)
  };
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

/* Legacy: keep buildImagePrompt for backwards-compatible single-string output.
   It now returns the universal format, which is the most readable. */
function buildImagePrompt(project, page) {
  return buildUniversalPrompt(buildPromptParts(project, page));
}

/* ---------- MATERIALS BUILDER: GENERATORS ---------- */
/* These are pure functions: (project, config) → material object.
   They never mutate state — Actions wraps them and writes to project.materials. */

function generateCardSet(project, config) {
  /* config: { type, source, sourceCategory?, title, items?, ageOverride? }
     - type: one of MATERIAL_TYPES keys
     - source: 'fromAssetCategory' | 'fromVocabulary' | 'fromPages' | 'manual'
     - sourceCategory: when source=fromAssetCategory, which category id
     - title: display name for the set
     - items: pre-built items if source=manual
  */
  const typeDef = MATERIAL_TYPES[config.type];
  let items = [];

  if (config.source === 'fromAssetCategory') {
    const cat = project.assetLibrary[config.sourceCategory] || [];
    items = cat.map(asset => ({
      id: 'item_' + asset.id,
      label: asset.label,
      labelEn: '',
      definition: asset.description || `A ${asset.label} found in the natural world.`,
      classification: '',
      sourceAssetId: asset.id,
      sourceCategory: config.sourceCategory,
      imagePromptSet: null
    }));
  } else if (config.source === 'fromVocabulary') {
    const vocabRaw = project.curriculum.vocabulary || '';
    const words = vocabRaw.split('\n').map(w => w.trim()).filter(Boolean);
    items = words.map((word, i) => ({
      id: 'item_vocab_' + i,
      label: word,
      labelEn: '',
      definition: '',
      classification: '',
      sourceAssetId: null,
      sourceCategory: null,
      imagePromptSet: null
    }));
  } else if (config.source === 'fromPages') {
    const contentPages = project.pages.filter(p => p.role === 'content' && p.title);
    items = contentPages.map((p, i) => ({
      id: 'item_page_' + p.index,
      label: p.title,
      labelEn: '',
      definition: p.body || '',
      classification: '',
      sourceAssetId: null,
      sourceCategory: null,
      sourcePageIndex: p.index,
      imagePromptSet: null
    }));
  } else if (config.source === 'manual') {
    items = config.items || [];
  }

  return {
    id: 'cardset_' + Date.now().toString(36),
    type: config.type,
    title: config.title || typeDef.label,
    source: config.source,
    sourceCategory: config.sourceCategory || null,
    ageGroup: config.ageOverride || project.meta.ageGroup,
    presetForImage: typeDef.presetForImage,
    createdAt: new Date().toISOString(),
    items
  };
}

function generateImagePromptForCardItem(project, item, presetId) {
  /* Cards get isolated-object prompts on white background for printability.
     Override the project's locked characters — cards usually don't show Mia/Teo
     since they need clean specimen-style art. */
  const preset = STYLE_PRESETS[presetId] || STYLE_PRESETS.scientificWhite;
  const parts = {
    preset,
    presetClause: preset.styleClause,
    characters: [],
    charactersClause: '',
    assets: [],
    assetsClause: '',
    composition: 'isolated subject centered on pure white background, no shadow, scientific specimen plate style',
    audience: `for children aged ${project.meta.ageGroup} years`,
    safety: 'child-safe, no text or letters in image, clean white background',
    scene: item.label + (item.classification ? ' (' + item.classification + ')' : ''),
    aspect: '1:1',
    project: { topic: project.meta.topic, title: project.meta.title, ageGroup: project.meta.ageGroup }
  };
  return {
    generatedAt: new Date().toISOString(),
    presetId,
    aspect: '1:1',
    dalle: buildDallePrompt(parts),
    ideogram: buildIdeogramPrompt(parts),
    midjourney: buildMidjourneyPrompt(parts),

  };
}

function generateTeacherGuide(project, cardSet) {
  /* Builds a Montessori-style presentation script for a card set. */
  const typeDef = MATERIAL_TYPES[cardSet.type] || MATERIAL_TYPES.threePartCard;
  const itemList = cardSet.items.slice(0, 5).map(i => i.label).join(', ');
  const moreCount = Math.max(0, cardSet.items.length - 5);

  const sections = [];
  sections.push({
    heading: 'Material',
    body: `${typeDef.label}: ${cardSet.title}\n${cardSet.items.length} items${itemList ? ' including ' + itemList : ''}${moreCount ? ' and ' + moreCount + ' more' : ''}.`
  });
  sections.push({
    heading: 'Age',
    body: `${cardSet.ageGroup} years. ${typeDef.notes}`
  });
  sections.push({
    heading: 'Aim',
    body: `Direct: vocabulary development and classification of ${project.meta.topic || cardSet.title}.\nIndirect: preparation for written language, scientific observation, and care for the natural world.`
  });
  sections.push({
    heading: 'Vocabulary',
    body: cardSet.items.map(i => '• ' + i.label).join('\n') || '(no items yet)'
  });
  sections.push({
    heading: 'Presentation',
    body: presentationScript(cardSet.type, cardSet)
  });
  sections.push({
    heading: 'Control of error',
    body: cardSet.type === 'threePartCard'
      ? 'A complete control set (picture + label + definition together) lets the child verify their own work. The child finds errors independently.'
      : cardSet.type === 'classifiedCard'
      ? 'Cards turn over to reveal the correct category, or a control booklet shows complete sorting.'
      : 'Visual matching of label to picture provides immediate feedback.'
  });
  sections.push({
    heading: 'Extensions',
    body: project.curriculum.extensionActivities || extensionsForType(cardSet.type, project.meta.topic)
  });
  if (project.curriculum.amiAreas.length || project.curriculum.lk20Subjects.length) {
    sections.push({
      heading: 'Curriculum links',
      body: [
        project.curriculum.amiAreas.length ? 'AMI: ' + project.curriculum.amiAreas.join(', ') : '',
        project.curriculum.lk20Subjects.length ? 'LMS 2020: ' + project.curriculum.lk20Subjects.join(', ') : ''
      ].filter(Boolean).join('\n')
    });
  }

  return {
    id: 'guide_' + Date.now().toString(36),
    cardSetId: cardSet.id,
    title: 'Teacher guide — ' + cardSet.title,
    createdAt: new Date().toISOString(),
    sections
  };
}

function presentationScript(type, cardSet) {
  if (type === 'threePartCard') {
    return [
      '1. Invite the child to a quiet table. Bring the rolled mat and the card set.',
      '2. Lay out the picture cards in a column. Name each one slowly: "This is a ___."',
      '3. Place the label cards face down. Read the first label, then place it under its matching picture.',
      '4. Continue until all labels are matched. Read each pair together.',
      '5. Introduce the definition cards. Read each definition aloud and place it below its picture and label.',
      '6. Use the control card to check the work.',
      '7. Invite the child to repeat the work alone, then return cards to their place.'
    ].join('\n');
  } else if (type === 'nomenclatureCard') {
    return [
      '1. Bring the cards to the table on a tray. Lay out picture cards in a column.',
      '2. Name each picture clearly: "This is a ___."',
      '3. Show the label cards. Match each label to its picture, reading aloud.',
      '4. Allow the child to repeat the matching independently.',
      '5. The control card shows the correct pairing.'
    ].join('\n');
  } else if (type === 'classifiedCard') {
    return [
      '1. Bring out the sorting mat with category labels at the top.',
      '2. Show the cards one at a time. Discuss what category each belongs to.',
      '3. Place each card under its category, naming the classification aloud.',
      '4. When complete, review by category. The child sorts independently next.'
    ].join('\n');
  }
  return 'Present the material to the child individually, naming each piece clearly. Allow the child to handle and repeat the work independently.';
}

function extensionsForType(type, topic) {
  const t = topic || 'this topic';
  return [
    `• Take the cards outside and find the real things from ${t} in nature.`,
    `• Draw and label your favorite from the set.`,
    `• Write a short story or report about one item.`,
    `• Sort the cards in a different way (alphabetically, by size, by habitat).`
  ].join('\n');
}

function generateSortingMat(project, config) {
  /* config: { title, categories: ['Pattedyr','Fugler','Krypdyr'] } */
  return {
    id: 'mat_' + Date.now().toString(36),
    title: config.title || 'Sorting mat — ' + (project.meta.topic || project.meta.title),
    categories: config.categories || ['Category A', 'Category B'],
    createdAt: new Date().toISOString(),
    imagePromptSet: null
  };
}

function generateCertificate(project, config) {
  return {
    id: 'cert_' + Date.now().toString(36),
    title: config.title || (project.meta.title + ' — Certificate of completion'),
    body: config.body || `This certificate is awarded for the careful and joyful exploration of "${project.meta.title}".`,
    issuerLine: 'Little Montessori Explorers',
    createdAt: new Date().toISOString(),
    imagePromptSet: null
  };
}

function buildCardSetExportText(project, cardSet) {
  /* Structured text for printing: each item on its own block with clear sections.
     Easy to paste into a word processor and lay out for cardstock printing. */
  const typeDef = MATERIAL_TYPES[cardSet.type] || MATERIAL_TYPES.threePartCard;
  const lines = [];
  lines.push(`# ${cardSet.title}`);
  lines.push(`Type: ${typeDef.label}  ·  Age: ${cardSet.ageGroup}  ·  ${cardSet.items.length} items`);
  lines.push('');
  lines.push(`## Print instructions`);
  lines.push(`Print on heavy cardstock. Cut along the dashed lines. Laminate for repeated use.`);
  lines.push(`Each item produces ${typeDef.perItemArtifacts} card(s).`);
  lines.push('');
  lines.push(`## Items`);

  cardSet.items.forEach((item, i) => {
    lines.push('');
    lines.push(`### ${i+1}. ${item.label}`);
    if (item.labelEn) lines.push(`English: ${item.labelEn}`);
    if (item.classification) lines.push(`Classification: ${item.classification}`);
    if (item.definition) lines.push('');
    if (item.definition) lines.push(`Definition: ${item.definition}`);
    if (item.imagePromptSet) {
      lines.push('');
      lines.push(`Image prompt (${(STYLE_PRESETS[item.imagePromptSet.presetId]||{}).label || 'default'}):`);
      lines.push('> ' + item.imagePromptSet.dalle);
    }
  });

  return lines.join('\n');
}

function buildTeacherGuideExportText(guide) {
  const lines = [];
  lines.push(`# ${guide.title}`);
  lines.push('');
  guide.sections.forEach(s => {
    lines.push(`## ${s.heading}`);
    lines.push(s.body);
    lines.push('');
  });
  return lines.join('\n');
}

function generateTimeline(project, config) {
  /* config: { templateId, title?, format? } */
  const tpl = TIMELINE_TEMPLATES[config.templateId] || TIMELINE_TEMPLATES.custom;
  const format = config.format || tpl.defaultFormat;
  const formatDef = TIMELINE_FORMATS[format] || TIMELINE_FORMATS['6:1'];

  return {
    id: 'timeline_' + Date.now().toString(36),
    templateId: tpl.id,
    title: config.title || tpl.labelNo || tpl.label,
    format,
    aspectPerPanel: tpl.aspectPerPanel || '16:9',
    ageGroup: tpl.ageGroup || project.meta.ageGroup,
    amiArea: tpl.amiArea,
    createdAt: new Date().toISOString(),
    panels: tpl.panels.map((panel, i) => ({
      id: 'panel_' + Date.now().toString(36) + '_' + i,
      order: i,
      title: panel.title || '',
      titleNo: panel.titleNo || '',
      era: panel.era || '',
      subtitle: panel.subtitle || '',
      sceneSeed: panel.sceneSeed || '',
      durationLabel: panel.durationLabel || '',
      imagePromptSet: null
    }))
  };
}

function generateTimelinePanelPrompt(project, timeline, panel) {
  /* Timeline panels need consistent style across the sequence so they read
     well as one unified work. Force the timeline preset and the timeline
     aspect (16:9 or 1:1 depending on template). */
  const preset = STYLE_PRESETS.timeline;
  const sceneText = [panel.title, panel.subtitle, panel.sceneSeed].filter(Boolean).join('. ');

  const parts = {
    preset,
    presetClause: preset.styleClause,
    characters: [],
    charactersClause: '',
    assets: [],
    assetsClause: '',
    composition: 'horizontal timeline panel composition, wide cinematic framing, focal subject in center-left or center, designed to read alongside neighboring panels in a sequence',
    audience: `for children aged ${timeline.ageGroup} years`,
    safety: 'child-safe, historically and scientifically accurate, no anachronisms, no text or letters in image',
    scene: sceneText || panel.title || 'timeline panel',
    aspect: timeline.aspectPerPanel || '16:9',
    project: { topic: project.meta.topic, title: project.meta.title, ageGroup: timeline.ageGroup }
  };

  return {
    generatedAt: new Date().toISOString(),
    presetId: 'timeline',
    aspect: parts.aspect,
    dalle: buildDallePrompt(parts),
    ideogram: buildIdeogramPrompt(parts),
    midjourney: buildMidjourneyPrompt(parts),
    universal: buildUniversalPrompt(parts)
  };
}

function buildTimelineExportText(project, timeline) {
  const lines = [];
  const tpl = TIMELINE_TEMPLATES[timeline.templateId];
  const formatDef = TIMELINE_FORMATS[timeline.format];

  lines.push(`# ${timeline.title}`);
  lines.push('');
  lines.push(`Template: ${tpl ? tpl.label : timeline.templateId}  ·  Format: ${formatDef ? formatDef.label : timeline.format}  ·  ${timeline.panels.length} panels`);
  lines.push(`Age: ${timeline.ageGroup}${timeline.amiArea ? '  ·  AMI area: ' + timeline.amiArea : ''}`);
  lines.push('');
  lines.push(`## Print instructions`);
  if (timeline.format === '3-meter') {
    lines.push('Print each panel on heavy A4 paper landscape, then arrange in sequence to form one continuous 3-meter timeline.');
    lines.push('Laminate panels for repeated classroom use. Use Velcro or magnets for modular display.');
  } else {
    lines.push(`Print all ${timeline.panels.length} panels on a single A3 page in 6:1 grid layout.`);
    lines.push('Cut along guides if individual panels are needed for matching work.');
  }
  lines.push('');
  lines.push(`## Panels`);

  timeline.panels.forEach((panel, i) => {
    lines.push('');
    lines.push(`### Panel ${i+1}: ${panel.titleNo || panel.title}`);
    if (panel.title && panel.titleNo && panel.title !== panel.titleNo) {
      lines.push(`English: ${panel.title}`);
    }
    if (panel.era) lines.push(`Era: ${panel.era}`);
    if (panel.durationLabel) lines.push(`Duration: ${panel.durationLabel}`);
    if (panel.subtitle) lines.push(`Description: ${panel.subtitle}`);
    if (panel.imagePromptSet) {
      lines.push('');
      lines.push('Image prompt (DALL·E):');
      lines.push('> ' + panel.imagePromptSet.dalle);
    }
  });

  return lines.join('\n');
}

function scaffoldWorkbook(project) {
  const contentPages = project.pages.filter(p => p.role === 'content');
  const activities = [];

  activities.push({ type:'title', text:`${project.meta.title || 'Workbook'} — Companion activities` });
  activities.push({ type:'vocab', text:'Vocabulary card matching: match each new word from the book to its picture' });

  contentPages.forEach((p, i) => {
    activities.push({
      type:'reflection',
      text: `Page ${p.index+1}${p.title ? ' — ' + p.title : ''}: Draw what you remember and write one sentence about it.`
    });
  });

  activities.push({ type:'observation', text:'Observation page: spend 10 minutes outside and draw one thing you noticed connected to this book.' });
  activities.push({ type:'sorting', text:'Sorting mat: cut and sort cards into the categories from the book.' });
  activities.push({ type:'project', text:'Mini project: pick one idea from the book and create something to share with family.' });
  activities.push({ type:'certificate', text:'Certificate of completion: "I read this book and explored its ideas."' });

  return activities;
}

function buildPromptPack(project) {
  const lines = [];
  lines.push(`# ${project.meta.title || 'Untitled project'}`);
  if (project.meta.subtitle) lines.push(project.meta.subtitle);
  lines.push('');
  lines.push(`Type: ${(BOOK_TYPES.find(b => b.id === project.meta.bookType) || {}).label || project.meta.bookType}`);
  lines.push(`Pages: ${project.meta.pageCount}`);
  lines.push(`Age: ${project.meta.ageGroup}`);
  lines.push(`Language: ${(LANGUAGES.find(l => l.id === project.meta.language) || {}).label || project.meta.language}`);
  lines.push('');

  if (project.meta.logline) {
    lines.push('## Logline');
    lines.push(project.meta.logline);
    lines.push('');
  }

  lines.push('## Locked characters');
  if (project.characters.useMia) lines.push(`- Mia: ${LOCKED_CHARACTERS.mia.appearance}; outfit: ${LOCKED_CHARACTERS.mia.outfit}; ${LOCKED_CHARACTERS.mia.consistency}`);
  if (project.characters.useTeo) lines.push(`- Teo: ${LOCKED_CHARACTERS.teo.appearance}; outfit: ${LOCKED_CHARACTERS.teo.outfit}; ${LOCKED_CHARACTERS.teo.consistency}`);
  lines.push('');

  if (project.curriculum.amiAreas.length || project.curriculum.lk20Subjects.length || (project.curriculum.linkedTasks||[]).length || (project.curriculum.linkedGoals||[]).length) {
    lines.push('## Curriculum links');
    if (project.curriculum.amiAreas.length) lines.push(`AMI areas: ${project.curriculum.amiAreas.join(', ')}`);
    if (project.curriculum.lk20Subjects.length) lines.push(`LMS 2020 subjects: ${project.curriculum.lk20Subjects.join(', ')}`);

    const linkedTasks = (project.curriculum.linkedTasks || []).map(getAmiTaskById).filter(Boolean);
    if (linkedTasks.length) {
      lines.push('');
      lines.push('### Linked AMI tasks');
      linkedTasks.forEach(t => {
        lines.push('');
        lines.push(`**${t.titleNo || t.title}** (${t.area}, ${t.age})`);
        lines.push(`Direct aim: ${t.aim}`);
        lines.push(`Indirect aim: ${t.aimIndirect}`);
        lines.push(`Vocabulary: ${t.vocabulary.join(', ')}`);
      });
    }

    const linkedGoals = (project.curriculum.linkedGoals || []).map(getLk20GoalById).filter(Boolean);
    if (linkedGoals.length) {
      lines.push('');
      lines.push('### Linked LMS 2020 competence goals');
      linkedGoals.forEach(g => {
        lines.push('');
        lines.push(`**${g.subject} — ${stageLabelFor(g.stage)}**`);
        lines.push(g.goal);
      });
    }

    if (project.curriculum.learningGoals) { lines.push(''); lines.push('### Learning goals'); lines.push(project.curriculum.learningGoals); }
    if (project.curriculum.vocabulary) { lines.push(''); lines.push('### Vocabulary'); lines.push(project.curriculum.vocabulary); }
    lines.push('');
  }

  lines.push('## Page-by-page plan');
  project.pages.forEach(p => {
    lines.push('');
    lines.push(`### Page ${p.index + 1} — ${p.title || '(untitled)'} [${p.role}]`);
    if (p.body) lines.push(p.body);
    if (p.promptSet) {
      const ps = p.promptSet;
      lines.push('');
      lines.push(`Style preset: ${(STYLE_PRESETS[p.preset]||{}).label || p.preset}  ·  Aspect: ${ps.aspect}`);
      lines.push('');
      lines.push('— DALL·E 3 —');
      lines.push(ps.dalle);
      lines.push('');
      lines.push('— Ideogram —');
      lines.push(ps.ideogram);
      lines.push('');
      lines.push('— Midjourney v6 —');
      lines.push(ps.midjourney);
    } else if (p.imagePrompt) {
      lines.push('');
      lines.push('Image prompt:');
      lines.push('> ' + p.imagePrompt.replace(/\n/g, '\n> '));
    }
  });

  if (project.assetLibrary) {
    const totalAssets = ASSET_CATEGORIES.reduce((s,c) => s + (project.assetLibrary[c.id]||[]).length, 0);
    if (totalAssets > 0) {
      lines.push('');
      lines.push('## Asset library');
      ASSET_CATEGORIES.forEach(cat => {
        const items = project.assetLibrary[cat.id] || [];
        if (items.length) {
          lines.push('');
          lines.push(`### ${cat.label}`);
          items.forEach(a => lines.push(`- ${a.label}${a.description?': '+a.description:''}`));
        }
      });
    }
  }

  if (project.materials) {
    const m = project.materials;
    const hasAny = m.cardSets.length || m.teacherGuides.length || m.sortingMats.length || m.certificates.length || (m.timelines && m.timelines.length);
    if (hasAny) {
      lines.push('');
      lines.push('## Materials');

      if (m.cardSets.length) {
        m.cardSets.forEach(set => {
          lines.push('');
          lines.push('---');
          lines.push('');
          lines.push(buildCardSetExportText(project, set));
        });
      }
      if (m.teacherGuides.length) {
        m.teacherGuides.forEach(g => {
          lines.push('');
          lines.push('---');
          lines.push('');
          lines.push(buildTeacherGuideExportText(g));
        });
      }
      if (m.sortingMats.length) {
        lines.push('');
        lines.push('### Sorting mats');
        m.sortingMats.forEach(mat => {
          lines.push('');
          lines.push(`**${mat.title}**`);
          lines.push('Categories: ' + mat.categories.join(' · '));
        });
      }
      if (m.timelines && m.timelines.length) {
        m.timelines.forEach(tl => {
          lines.push('');
          lines.push('---');
          lines.push('');
          lines.push(buildTimelineExportText(project, tl));
        });
      }
      if (m.certificates.length) {
        lines.push('');
        lines.push('### Certificates');
        m.certificates.forEach(c => {
          lines.push('');
          lines.push(`**${c.title}**`);
          lines.push(c.body);
          lines.push(`— ${c.issuerLine}`);
        });
      }
    }
  }

  if (project.workbook.activities.length) {
    lines.push('');
    lines.push('## Workbook companion');
    project.workbook.activities.forEach((a,i) => {
      lines.push(`${i+1}. [${a.type}] ${a.text}`);
    });
  }

  return lines.join('\n');
}

function escMeta(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

  renderRail();

    document.getElementById('main').innerHTML = `<div class="empty"><strong>Render error</strong>${escMeta(e.message)}</div>`;
  }
}

function renderMain() {
  const main = document.getElementById('main');
  /* Standalone tools work without a project (they fall back to the library workspace,
     loaded by Actions.setView). Library / characters / series / welcome don't require one either. */
  const noProjectAllowed = ['welcome','library','characters','seriesLibrary','seriesDetail',
                            'materials','timelines','assetLibrary','curriculum'];
  if (!State.project && !noProjectAllowed.includes(State.view)) {
    main.innerHTML = renderWelcome();
    return;
  }
  switch (State.view) {
    case 'brain': main.innerHTML = renderBrain(); break;
    case 'pages': main.innerHTML = renderPagePlanner(); break;
    case 'visualStudio': main.innerHTML = renderVisualStudio(); break;
    case 'assetLibrary': main.innerHTML = renderAssetLibrary(); break;
    case 'images': main.innerHTML = renderVisualStudio(); break;
    case 'workbook': main.innerHTML = renderWorkbook(); break;
    case 'materials': main.innerHTML = renderMaterials(); break;
    case 'timelines': main.innerHTML = renderTimelines(); break;
    case 'curriculum': main.innerHTML = renderCurriculum(); break;
    case 'export': main.innerHTML = renderExport(); break;
    case 'library': main.innerHTML = renderLibrary(); break;
    case 'characters': main.innerHTML = renderCharacters(); break;
    case 'seriesLibrary': main.innerHTML = renderSeriesLibrary(); break;
    case 'seriesDetail': main.innerHTML = renderSeriesDetail(); break;
    default: main.innerHTML = renderWelcome();
  }
}

        </div>
        <div class="field">

          <select onchange="Actions.setDefaultFormat(this.value)">
            ${Object.values(PROMPT_FORMATS).map(f => `<option value="${f.id}" ${defaultFormat===f.id?'selected':''}>${escMeta(f.label)}</option>`).join('')}

function renderPageGenerator(pg, realIdx, defaultFormat) {
  const ps = pg.promptSet;
  const project = State.project;
  const preset = STYLE_PRESETS[pg.preset] || STYLE_PRESETS.watercolor;
  const linkedAssets = (pg.assetRefs || []).map(ref => {
    const cat = project.assetLibrary[ref.category] || [];
    const a = cat.find(x => x.id === ref.id);
    return a ? `${a.label}` : null;
  }).filter(Boolean);

  return `
    <div class="card vs-page">
      <div class="card-head" style="align-items:flex-start">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="pill ${pg.role==='cover'?'pill-pink':pg.role==='content'?'pill-teal':'pill-amber'}">${pg.role}</span>
            <h3 class="card-title" style="margin:0">${t('brainOutputPages').replace(/^./, c=>c.toUpperCase())} ${pg.index+1} — ${escMeta(pg.title)||'('+t('untitled').toLowerCase()+')'}</h3>
            ${ps && ps.stale ? `<span class="pill" style="background:#FAEEDA;color:#633806">${t('vsStaleBadge')}</span>` : ''}
          </div>
          ${pg.body ? `<p class="card-sub" style="margin-top:6px">${escMeta(pg.body.slice(0,140))}${pg.body.length>140?'…':''}</p>` : ''}
        </div>
        <button class="btn btn-sm ${ps && ps.stale ? 'btn-primary' : ''}" onclick="Actions.generateImagePrompt(${realIdx})">${ps?(ps.stale?t('regenerate'):t('refresh')):t('generate')}</button>
      </div>

      <div class="row row-2" style="margin-bottom:12px">
        <div class="field" style="margin-bottom:0">
          <div class="field-label">${t('vsPagePresetLabel')}</div>
          <select onchange="Actions.setPagePreset(${realIdx}, this.value)">
            ${Object.values(STYLE_PRESETS).map(s => `<option value="${s.id}" ${pg.preset===s.id?'selected':''}>${escMeta(s.label)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="margin-bottom:0">
          <div class="field-label">${t('vsLinkedAssetsLabel')} (${linkedAssets.length})</div>
          <div style="font-size:11px;color:var(--text-muted);min-height:34px;padding:7px 0">
            ${linkedAssets.length ? linkedAssets.map(l => `<span class="pill" style="margin-right:4px;margin-bottom:4px">${escMeta(l)}</span>`).join('') : `<span style="color:var(--text-subtle)">${t('vsNoneLinked')} <a href="#" onclick="showSheet('linkAssets', {pageIdx:${realIdx}});return false" style="color:var(--pink-400)">${t('vsLinkAssetsLink')}</a></span>`}
            ${linkedAssets.length ? `<a href="#" onclick="showSheet('linkAssets', {pageIdx:${realIdx}});return false" style="color:var(--pink-400);font-size:11px;margin-left:4px">${t('vsLinkAssetsEdit')}</a>` : ''}
          </div>
        </div>
      </div>

      ${ps ? renderPromptTabs(ps, realIdx, defaultFormat) : `<div style="font-size:12px;color:var(--text-subtle);font-style:italic;padding:8px 0">${t('vsNoPromptYet', {preset: escMeta(preset.label)})}</div>`}
    </div>
  `;
}

function renderPromptTabs(ps, realIdx, defaultFormat) {
  return `
    <div class="prompt-tabs">
      ${Object.values(PROMPT_FORMATS).map(f => `
        <button class="prompt-tab ${defaultFormat===f.id?'on':''}" onclick="switchPromptTab(this, '${realIdx}_${f.id}')">${escMeta(f.label)}</button>
      `).join('')}
    </div>
    ${Object.values(PROMPT_FORMATS).map(f => `
      <div class="prompt-panel" id="panel_${realIdx}_${f.id}" style="${defaultFormat===f.id?'':'display:none'}">
        <div class="prompt-text">${escMeta(ps[f.id])}</div>
        <div style="display:flex;gap:6px;margin-top:8px;align-items:center">
          <button class="btn btn-sm" onclick="copyPagePrompt(${realIdx},'${f.id}')">${t('vsCopyPromptBtn', {format: escMeta(f.label)})}</button>
          <span style="font-size:11px;color:var(--text-subtle)">${escMeta(f.hint)}</span>
        </div>
      </div>
    `).join('')}
  `;
}

function copyPagePrompt(pageIdx, formatId) {
  const page = State.project.pages[pageIdx];
  if (!page || !page.promptSet || !page.promptSet[formatId]) {
    toast(t('toastPromptNotGenerated'));
    return;
  }
  copyToClipboard(page.promptSet[formatId]);
}

function switchPromptTab(btn, panelId) {
  const tabs = btn.parentElement.querySelectorAll('.prompt-tab');
  tabs.forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  const card = btn.closest('.vs-page');
  card.querySelectorAll('.prompt-panel').forEach(p => p.style.display = 'none');
  const panel = document.getElementById('panel_' + panelId);
  if (panel) panel.style.display = '';
}

  const matCount = mat.sortingMats.length;

    ${cardSetCount > 0 ? `
      <h2 style="font-size:14px;font-weight:500;margin:24px 0 10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px">${t('matCardSetsHeader')}</h2>
      ${mat.cardSets.map(set => renderCardSet(set)).join('')}
